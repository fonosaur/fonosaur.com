<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>FONOSAUR - Sampler</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@200;400;700&display=swap");

      :root {
        --bg: #0a0a0c;
        --panel: #141418;
        --panel-2: #101014;
        --line: #26262b;
        --line-strong: rgba(255, 255, 255, 0.1);
        --text: #e8e8ea;
        --sub: #9c9ca4;
        --blue: #3b8bff;
        --purple: #8b5cf6;
        --bronze: #a06820;
        --green: #00cc50;
        --lcd-bg: #04150e;
        --lcd-bg-2: #020906;
        --lcd-line: rgba(125, 255, 184, 0.08);
        --lcd-ink: #b6ffd5;
        --lcd-ink-soft: rgba(125, 255, 184, 0.58);
        --lcd-base-font: "Space Mono", monospace;
        --lcd-text-font: var(--lcd-base-font);
        --lcd-number-font: var(--lcd-base-font);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100svh;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.025),
            transparent 32%
          ),
          var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        overflow-x: hidden;
      }

      html.is-embedded,
      html.is-embedded body {
        height: 100%;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
        color: var(--text);
      }

      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--green);
        outline-offset: 2px;
      }

      .wrap {
        width: 100%;
        max-width: 560px;
        margin: 0 auto;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 10px 10px 28px;
      }

      .share-intro {
        width: min(100%, 520px);
        display: grid;
        gap: 12px;
        justify-items: start;
        padding: 8px 2px 2px;
      }

      .share-intro[hidden] {
        display: none;
      }

      .share-brand {
        display: inline-flex;
        align-items: baseline;
        gap: 0;
        color: var(--text);
        text-decoration: none;
        font-family: "Unbounded", sans-serif;
        font-size: clamp(24px, 7vw, 34px);
        letter-spacing: 0;
        white-space: nowrap;
        line-height: 0.92;
      }

      .share-brand .fono {
        font-weight: 200;
      }

      .share-brand .saur {
        position: relative;
        display: inline-block;
        font-weight: 700;
        animation: drift 10s ease infinite;
      }

      .share-brand .saur::before {
        content: "SAUR";
        position: absolute;
        left: 0;
        top: 0;
        color: rgba(59, 139, 255, 0.5);
        opacity: 0;
        pointer-events: none;
        mix-blend-mode: screen;
        animation: bSp 4s ease infinite;
      }

      .share-brand .saur::after {
        content: "SAUR";
        position: absolute;
        left: 0;
        top: 0;
        color: #fff;
        text-shadow:
          0 0 4px #fff,
          0 0 15px rgba(0, 204, 80, 0.6),
          0 0 40px rgba(59, 139, 255, 0.3);
        opacity: 0;
        pointer-events: none;
        animation: bSh 4s ease infinite;
      }

      .share-copy {
        margin: 0;
        color: var(--sub);
        font-size: 14px;
        line-height: 1.6;
        max-width: 34rem;
      }

      .share-copy a {
        color: var(--text);
        text-decoration: none;
        border-bottom: 1px solid rgba(232, 232, 234, 0.26);
      }

      .share-explore {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 42px;
        padding: 0 15px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.11);
        background: rgba(18, 18, 22, 0.88);
        color: var(--text);
        text-decoration: none;
        font-family: "Space Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .share-explore:hover,
      .share-explore:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(232, 232, 234, 0.3);
        background: rgba(24, 24, 28, 0.94);
      }

      .share-brand:focus-visible,
      .share-explore:focus-visible {
        outline: 2px solid var(--green);
        outline-offset: 3px;
      }

      .device {
        position: relative;
        width: min(100%, var(--device-width, 520px));
        height: var(--device-height, auto);
        max-width: 520px;
        aspect-ratio: 0.73;
        flex-shrink: 0;
        border-radius: 28px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(
            180deg,
            rgba(29, 29, 35, 0.96),
            rgba(14, 14, 18, 0.98)
          ),
          var(--panel);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 22px 48px rgba(0, 0, 0, 0.46);
      }

      .skin {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: var(--skin-opacity, 0.55);
        filter: saturate(var(--skin-saturation, 1))
          brightness(var(--skin-brightness, 0.85));
      }

      .skinveil {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(9, 9, 11, 0.18), rgba(9, 9, 11, 0.48)),
          radial-gradient(
            circle at 50% 18%,
            rgba(255, 255, 255, 0.03),
            transparent 42%
          );
      }

      .device.has-print-skin .skin {
        opacity: 0.68;
        filter: saturate(1.04) brightness(0.92) contrast(1);
      }

      .device.has-print-skin .skinveil {
        background:
          linear-gradient(180deg, rgba(9, 9, 11, 0.34), rgba(9, 9, 11, 0.54)),
          radial-gradient(
            circle at 50% 18%,
            rgba(255, 255, 255, 0.055),
            transparent 38%
          ),
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.08),
            transparent 28%,
            transparent 72%,
            rgba(0, 0, 0, 0.1)
          );
      }

      .device-ui {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 7px;
        padding: 9px;
        height: 100%;
      }

      .mode-switch {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 5px;
        flex-shrink: 0;
      }

      .mode-btn {
        min-height: 30px;
        border-radius: 11px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.035),
            rgba(10, 10, 12, 0.82)
          ),
          rgba(13, 13, 16, 0.84);
        color: rgba(232, 232, 234, 0.58);
        font-family: "Space Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        transition:
          border-color 0.16s ease,
          background 0.16s ease,
          color 0.16s ease,
          box-shadow 0.16s ease,
          transform 0.16s ease;
      }

      .mode-btn.is-active {
        border-color: rgba(125, 255, 184, 0.35);
        background:
          radial-gradient(
            circle at 50% 0,
            rgba(91, 255, 154, 0.16),
            transparent 70%
          ),
          linear-gradient(
            180deg,
            rgba(19, 54, 34, 0.82),
            rgba(10, 18, 13, 0.92)
          );
        color: var(--lcd-ink);
        box-shadow:
          inset 0 0 0 1px rgba(125, 255, 184, 0.06),
          0 0 16px rgba(0, 255, 120, 0.1);
      }

      .mode-btn:active {
        transform: translateY(1px);
      }

      .lcd {
        position: relative;
        --lcd-text-font: var(--lcd-base-font);
        --lcd-number-font: var(--lcd-base-font);
        padding: 6px 8px 7px;
        border-radius: 13px;
        border: 1px solid rgba(48, 112, 82, 0.45);
        background:
          repeating-linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.22) 0,
            rgba(0, 0, 0, 0.22) 1px,
            transparent 1px,
            transparent 3px
          ),
          radial-gradient(
            circle at 50% 12%,
            rgba(125, 255, 184, 0.08),
            transparent 60%
          ),
          linear-gradient(180deg, var(--lcd-bg), var(--lcd-bg-2));
        box-shadow:
          inset 0 0 20px rgba(0, 255, 120, 0.06),
          inset 0 1px 0 rgba(162, 255, 213, 0.07),
          0 0 0 1px rgba(5, 18, 12, 0.55);
        color: var(--lcd-ink);
        font-family: var(--lcd-text-font);
        text-shadow: 0 0 9px rgba(0, 255, 120, 0.16);
      }

      .lcd::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background:
          linear-gradient(180deg, rgba(180, 255, 217, 0.06), transparent 34%),
          repeating-linear-gradient(
            180deg,
            transparent 0,
            transparent 2px,
            rgba(0, 0, 0, 0.12) 2px,
            rgba(0, 0, 0, 0.12) 3px
          );
        pointer-events: none;
      }

      .lcd-top {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 4px;
      }

      .lcd-status {
        font-size: 17px;
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 400;
      }

      .lcd-tools {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .lcd-tool-btn {
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 7px;
        border: 1px solid rgba(125, 255, 184, 0.16);
        background: rgba(7, 22, 15, 0.88);
        color: var(--lcd-ink);
        transition:
          background 0.16s ease,
          color 0.16s ease,
          opacity 0.16s ease,
          border-color 0.16s ease,
          box-shadow 0.16s ease;
        box-shadow: inset 0 0 0 1px rgba(125, 255, 184, 0.03);
        font-family: "Space Mono", monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .lcd-tool-btn svg {
        width: 14px;
        height: 14px;
        display: block;
        filter: drop-shadow(0 0 4px rgba(0, 255, 120, 0.32));
      }

      .lcd-tool-btn.off {
        opacity: 0.52;
        color: rgba(125, 255, 184, 0.5);
        background: rgba(6, 15, 11, 0.75);
        box-shadow: none;
      }

      .lcd-tool-btn:not(.off) {
        box-shadow:
          inset 0 0 0 1px rgba(125, 255, 184, 0.06),
          0 0 14px rgba(0, 255, 120, 0.12);
      }

      .quant-btn {
        width: auto;
        min-width: 34px;
        padding: 0 7px;
      }

      .info-wrap {
        display: inline-flex;
      }

      .info-btn {
        padding: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .info-btn::before {
        content: "i";
        display: block;
        width: 100%;
        text-align: center;
        text-transform: lowercase;
      }

      .info-panel {
        max-height: 0;
        overflow: hidden;
        padding: 0 10px;
        margin: 0;
        border-radius: 10px;
        border: 0 solid rgba(125, 255, 184, 0.18);
        background:
          linear-gradient(180deg, rgba(8, 24, 17, 0.98), rgba(5, 16, 11, 0.98)),
          rgba(7, 22, 15, 0.98);
        color: var(--lcd-ink-soft);
        font-size: 10px;
        line-height: 1.45;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        box-shadow:
          0 18px 32px rgba(0, 0, 0, 0.38),
          inset 0 0 0 1px rgba(125, 255, 184, 0.04);
        opacity: 0;
        transform: translateY(-4px);
        pointer-events: none;
        transition:
          max-height 180ms ease,
          padding 180ms ease,
          margin 180ms ease,
          border-width 180ms ease,
          opacity 160ms ease,
          transform 160ms ease;
      }

      .lcd.show-info .info-panel {
        max-height: 56px;
        padding: 7px 10px 8px;
        margin: 0 0 5px;
        border-width: 1px;
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .info-panel b {
        display: block;
        margin-top: 6px;
        color: var(--lcd-ink);
        font-family: "Space Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.06em;
        font-weight: 700;
      }

      .lcd-main {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .lcd-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
      }

      .lcd-bars {
        min-width: 0;
        font-size: 13px;
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--lcd-ink-soft);
        white-space: nowrap;
      }

      .lcd-stepper {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        gap: 2px;
        padding: 1px;
        border-radius: 999px;
        border: 1px solid rgba(125, 255, 184, 0.14);
        background: rgba(8, 22, 16, 0.82);
        box-shadow: inset 0 0 0 1px rgba(125, 255, 184, 0.02);
      }

      .lcd-stepper button {
        width: 19px;
        height: 19px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--lcd-ink);
        font-family: var(--lcd-text-font);
        font-size: 16px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .lcd-stepper span {
        min-width: 34px;
        text-align: center;
        font-size: 17px;
        line-height: 1;
        letter-spacing: 0.08em;
      }

      .lcd-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: var(--lcd-number-font);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.06em;
      }

      .lcd-divider {
        opacity: 0.58;
      }

      .lcd-message {
        min-height: 1.1em;
        font-size: 16px;
        line-height: 1;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 400;
      }

      .lcd-countdown {
        display: flex;
        gap: 4px;
        align-items: center;
        min-height: 1.1em;
      }

      .lcd-countdown[hidden] {
        display: none;
      }

      .lcd-countdown span {
        opacity: 0.3;
        font-size: 24px;
        line-height: 1;
        letter-spacing: 0.06em;
      }

      .lcd-countdown span + span::before {
        content: "\00b7";
        margin-right: 4px;
        opacity: 0.58;
      }

      .lcd-countdown span.is-live {
        opacity: 1;
      }

      .lcd-countdown span.is-done {
        opacity: 0.7;
      }

      .lcd-steps {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(16, minmax(0, 1fr));
        gap: 3px;
        margin-top: 6px;
      }

      .lcd-steps span {
        height: 7px;
        border-radius: 2px;
        border: 1px solid rgba(125, 255, 184, 0.08);
        background: rgba(14, 76, 44, 0.18);
        transition:
          background 0.08s linear,
          box-shadow 0.08s linear,
          opacity 0.08s linear;
      }

      .lcd-steps span.is-on {
        background: rgba(58, 176, 104, 0.48);
      }

      .lcd-steps span.is-active {
        background: rgba(125, 255, 184, 0.92);
        box-shadow: 0 0 12px rgba(0, 255, 120, 0.2);
      }

      .transport {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 5px;
      }

      .transport-btn,
      .bottom-btn {
        min-width: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 6px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.04),
            rgba(17, 17, 20, 0.96)
          ),
          var(--panel-2);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.05em;
        line-height: 1;
        font-family: "Space Mono", monospace;
        transition:
          transform 0.15s ease,
          border-color 0.15s ease,
          background 0.15s ease,
          color 0.15s ease,
          opacity 0.15s ease;
      }

      .transport-btn:active,
      .bottom-btn:active,
      .lcd-tool-btn:active {
        transform: translateY(1px);
      }

      .transport-btn:disabled {
        opacity: 0.42;
        cursor: default;
      }

      .transport-btn.is-live {
        border-color: rgba(255, 92, 92, 0.65);
        color: #fff4f4;
        background:
          linear-gradient(
            180deg,
            rgba(255, 76, 76, 0.28),
            rgba(17, 17, 20, 0.96)
          ),
          var(--panel-2);
        box-shadow:
          0 0 18px rgba(255, 76, 76, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .transport-btn.is-playing {
        border-color: rgba(122, 182, 87, 0.42);
        color: #f3fff3;
        background:
          linear-gradient(
            180deg,
            rgba(122, 182, 87, 0.2),
            rgba(17, 17, 20, 0.96)
          ),
          var(--panel-2);
      }

      .transport-btn.is-copied {
        border-color: rgba(90, 255, 152, 0.78);
        color: #f7fff9;
        background:
          radial-gradient(
            circle at top,
            rgba(148, 255, 188, 0.18),
            transparent 78%
          ),
          linear-gradient(180deg, rgba(13, 51, 29, 0.96), rgba(9, 35, 20, 0.98));
        box-shadow:
          inset 0 1px 0 rgba(222, 255, 231, 0.07),
          0 0 0 1px rgba(90, 255, 152, 0.14),
          0 0 22px rgba(18, 181, 75, 0.18);
      }

      .transport-icon {
        flex-shrink: 0;
        font-size: 12px;
      }

      .record-dot {
        width: 8px;
        height: 8px;
        flex-shrink: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.22);
      }

      .transport-btn.is-live .record-dot {
        background: #ff5a5a;
        box-shadow: 0 0 12px rgba(255, 90, 90, 0.5);
      }

      .pad-zone {
        flex: 1;
        min-height: 0;
        padding: 5px;
        position: relative;
        z-index: 1;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.015),
            rgba(0, 0, 0, 0.08)
          ),
          rgba(9, 9, 11, 0.3);
      }

      .fx-zone {
        flex: 1;
        min-height: 0;
        display: none;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 7px;
      }

      .device-ui[data-mode="fx"] .pad-zone,
      .device-ui[data-mode="fx"] .bottom-row {
        display: none;
      }

      .device-ui[data-mode="fx"] .fx-zone {
        display: grid;
      }

      .xy-pad {
        position: relative;
        min-height: 0;
        border-radius: 18px;
        border: 1px solid rgba(125, 255, 184, 0.15);
        overflow: visible;
        touch-action: none;
        user-select: none;
        cursor: crosshair;
        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(125, 255, 184, 0.08),
            transparent 26%
          ),
          linear-gradient(
            0deg,
            rgba(22, 80, 42, 0.38),
            rgba(6, 12, 18, 0.48) 50%,
            rgba(58, 94, 154, 0.34)
          ),
          rgba(7, 8, 10, 0.64);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.035),
          inset 0 -38px 60px rgba(0, 0, 0, 0.34);
      }

      .xy-pad::before,
      .xy-pad::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .xy-pad::before {
        inset: 12px;
        border-radius: 14px;
        background:
          linear-gradient(
            90deg,
            transparent calc(50% - 0.5px),
            rgba(232, 232, 234, 0.18) 50%,
            transparent calc(50% + 0.5px)
          ),
          linear-gradient(
            0deg,
            transparent calc(50% - 0.5px),
            rgba(232, 232, 234, 0.18) 50%,
            transparent calc(50% + 0.5px)
          );
        opacity: 0.7;
      }

      .xy-pad::after {
        inset: 0;
        border-radius: inherit;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.028) 0 1px,
            transparent 1px 42px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.024) 0 1px,
            transparent 1px 42px
          );
        mix-blend-mode: screen;
        opacity: 0.68;
      }

      .xy-range-label {
        position: absolute;
        z-index: 2;
        color: rgba(232, 232, 234, 0.58);
        font-family: "Space Mono", monospace;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        pointer-events: none;
        padding: 3px 6px;
        border-radius: 999px;
        background: rgba(5, 8, 7, 0.58);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      }

      .xy-range-label.y-max {
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
      }

      .xy-range-label.y-min {
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
      }

      .xy-range-label.x-min {
        top: 50%;
        left: 12px;
        transform: translateY(-50%);
      }

      .xy-range-label.x-max {
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
      }

      .axis-picker {
        position: absolute;
        z-index: 6;
        font-family: "Space Mono", monospace;
        text-transform: uppercase;
      }

      .axis-picker.y-axis {
        top: 10px;
        left: 10px;
      }

      .axis-picker.x-axis {
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%);
      }

      .axis-btn {
        min-height: 30px;
        border-radius: 999px;
        border: 1px solid rgba(125, 255, 184, 0.2);
        background:
          linear-gradient(180deg, rgba(8, 24, 17, 0.94), rgba(5, 12, 9, 0.9)),
          rgba(6, 10, 8, 0.88);
        color: var(--lcd-ink);
        font-family: inherit;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        padding: 0 12px;
        box-shadow:
          0 10px 22px rgba(0, 0, 0, 0.28),
          inset 0 0 0 1px rgba(125, 255, 184, 0.05);
      }

      .axis-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        min-width: 120px;
        max-height: min(190px, calc(100svh - 24px));
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 5px;
        border-radius: 12px;
        border: 1px solid rgba(125, 255, 184, 0.18);
        background:
          linear-gradient(180deg, rgba(9, 22, 16, 0.98), rgba(5, 10, 8, 0.98)),
          rgba(6, 10, 8, 0.98);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.44);
        z-index: 20;
      }

      .axis-picker.x-axis .axis-menu {
        top: auto;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
      }

      .axis-menu[hidden] {
        display: none;
      }

      .axis-option {
        width: 100%;
        min-height: 30px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: rgba(232, 232, 234, 0.78);
        font-family: inherit;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-align: left;
        padding: 0 9px;
      }

      .axis-option.is-selected {
        color: var(--lcd-ink);
        background: rgba(125, 255, 184, 0.1);
      }

      .axis-option:disabled {
        color: rgba(232, 232, 234, 0.3);
        cursor: not-allowed;
      }

      .xy-cursor {
        position: absolute;
        z-index: 3;
        left: 50%;
        top: 50%;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(182, 255, 210, 0.78);
        background: radial-gradient(
          circle,
          rgba(210, 255, 229, 0.9) 0 2px,
          rgba(125, 255, 184, 0.24) 3px,
          transparent 62%
        );
        box-shadow:
          0 0 20px rgba(0, 255, 120, 0.2),
          inset 0 0 16px rgba(125, 255, 184, 0.2);
        pointer-events: none;
        transition:
          left 0.18s ease,
          top 0.18s ease,
          transform 0.18s ease;
      }

      .xy-pad.is-touching .xy-cursor {
        transform: translate(-50%, -50%) scale(1.08);
        transition: none;
      }

      .fx-controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 6px;
      }

      .stutter-btn {
        min-height: 54px;
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          radial-gradient(
            circle at 50% 0,
            rgba(255, 215, 120, 0.12),
            transparent 72%
          ),
          linear-gradient(
            180deg,
            rgba(32, 31, 28, 0.94),
            rgba(13, 13, 15, 0.98)
          );
        color: var(--text);
        font-family: "Space Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        touch-action: none;
      }

      .stutter-btn.is-held {
        border-color: rgba(255, 202, 92, 0.64);
        color: #fff8df;
        background:
          radial-gradient(
            circle at 50% 0,
            rgba(255, 211, 105, 0.26),
            transparent 72%
          ),
          linear-gradient(
            180deg,
            rgba(76, 50, 16, 0.92),
            rgba(20, 15, 10, 0.98)
          );
        box-shadow:
          0 0 22px rgba(255, 174, 42, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .grid {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(4, minmax(0, 1fr));
        gap: 6px;
        width: 100%;
        height: 100%;
      }

      .pad {
        appearance: none;
        -webkit-appearance: none;
        position: relative;
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        border-radius: 12px;
        cursor: pointer;
        user-select: none;
        touch-action: none;
        padding: 0;
        background: linear-gradient(160deg, #2a2a31, #131317);
        border: 1px solid rgba(255, 255, 255, 0.07);
        box-shadow:
          0 3px 0 rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
        transition: transform 0.05s;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        text-align: left;
      }

      .pad:active {
        transform: translateY(2px) scale(0.985);
        box-shadow:
          0 1px 0 rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
      }

      .pad:focus-visible {
        border-color: rgba(0, 204, 80, 0.7);
        box-shadow:
          0 0 0 2px rgba(0, 204, 80, 0.2),
          0 3px 0 rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
      }

      .pad .dot {
        position: absolute;
        top: 8px;
        left: 9px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
      }

      .pad .key {
        position: absolute;
        top: 6px;
        right: 8px;
        font-family: "Space Mono", monospace;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.62);
      }

      .pad .lab {
        padding: 7px 9px;
        font-size: 10px;
        font-weight: 700;
        font-family: "Space Mono", monospace;
        letter-spacing: 0.03em;
        color: var(--sub);
        white-space: nowrap;
      }

      .pad .glow {
        position: absolute;
        inset: -1px;
        border-radius: 12px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.32s ease-out;
      }

      .pad.hit .glow {
        opacity: 0.85;
        transition: opacity 0s;
      }

      .bottom-row {
        position: relative;
        z-index: 2;
        flex-shrink: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin-top: 1px;
      }

      .toast {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 30;
        width: min(calc(100vw - 28px), 280px);
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(130, 255, 180, 0.36);
        background: linear-gradient(
          180deg,
          rgba(160, 255, 198, 0.98),
          rgba(112, 236, 160, 0.96)
        );
        color: #08120c;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
        letter-spacing: 0.03em;
        text-align: center;
        text-transform: uppercase;
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.44),
          0 0 34px rgba(76, 255, 145, 0.18);
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.96);
        pointer-events: none;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .toast.is-visible {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      html.is-embedded body {
        background: var(--bg);
      }

      html.is-embedded .wrap {
        min-height: 100%;
        justify-content: flex-start;
        gap: 8px;
        padding: 4px;
      }

      @media (min-width: 700px) {
        .wrap {
          padding: 8px 16px 18px;
        }

        .device-ui {
          gap: 7px;
          padding: 9px;
        }

        .pad-zone {
          padding: 6px;
        }

        .grid {
          gap: 7px;
        }
      }

      @media (max-width: 560px) {
        .wrap {
          gap: 8px;
          padding: 6px 4px 24px;
        }

        .share-intro {
          gap: 10px;
          padding: 6px 2px 0;
        }

        .share-copy {
          font-size: 13px;
        }

        .share-explore {
          min-height: 40px;
          padding: 0 14px;
          font-size: 10px;
        }

        .device-ui {
          gap: 6px;
          padding: 7px;
        }

        .device {
          width: 100%;
          max-height: none;
          border-radius: 24px;
        }

        .lcd {
          padding: 6px 6px 7px;
          border-radius: 12px;
        }

        .lcd-meta {
          gap: 5px;
        }

        .lcd-bars,
        .lcd-stepper span {
          font-size: 13px;
        }

        .lcd-stepper button {
          width: 17px;
          height: 17px;
        }

        .lcd-stepper span {
          min-width: 28px;
        }

        .transport {
          gap: 4px;
        }

        .transport-btn,
        .bottom-btn {
          gap: 4px;
          padding: 8px 4px;
          font-size: 8.5px;
        }

        .pad-zone {
          padding: 5px;
        }

        .grid {
          gap: 5px;
        }

        .axis-menu {
          min-width: 136px;
          max-height: min(176px, calc(100svh - 24px));
          padding: 4px;
        }

        .axis-option {
          min-height: 28px;
          font-size: 9.5px;
          padding: 0 8px;
        }

        .pad .dot {
          width: 5px;
          height: 5px;
          top: 6px;
          left: 6px;
        }

        .pad .key {
          top: 5px;
          right: 6px;
          font-size: 7px;
        }

        .pad .lab {
          padding: 5px 4px 5px;
          font-size: 6.5px;
          letter-spacing: 0;
        }

        .lcd-status {
          font-size: 14px;
        }

        .lcd-message {
          font-size: 16px;
        }

        .lcd-countdown span {
          font-size: 22px;
        }

        .hint {
          margin-inline: 2px;
        }
      }

      @media (max-width: 420px) {
        .wrap {
          padding: 6px 3px 22px;
        }

        .share-brand {
          font-size: clamp(22px, 8vw, 30px);
        }

        .device-ui {
          gap: 5px;
          padding: 6px;
        }

        .transport {
          gap: 3px;
        }

        .transport-btn,
        .bottom-btn {
          gap: 3px;
          padding: 7px 3px;
          font-size: 8px;
        }

        .pad-zone {
          padding: 4px;
          border-radius: 16px;
        }

        .grid {
          gap: 4px;
        }

        .pad .dot {
          width: 4px;
          height: 4px;
          top: 5px;
          left: 5px;
        }

        .pad .key {
          top: 4px;
          right: 5px;
          font-size: 6px;
        }

        .pad .lab {
          padding: 4px 4px 5px;
          font-size: 6px;
        }

        .info-panel {
          font-size: 9px;
          letter-spacing: 0.03em;
        }

        .info-panel b {
          font-size: 10px;
        }

        .toast {
          width: min(calc(100vw - 24px), 228px);
          padding: 13px 14px;
          font-size: 13px;
        }
      }

      @keyframes drift {
        0%,
        100% {
          color: #3b8bff;
          text-shadow: 0 0 20px rgba(59, 139, 255, 0.15);
        }
        25% {
          color: #8b5cf6;
          text-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }
        50% {
          color: #a06820;
          text-shadow: 0 0 20px rgba(160, 104, 32, 0.2);
        }
        75% {
          color: #00cc50;
          text-shadow: 0 0 22px rgba(0, 204, 80, 0.18);
        }
      }

      @keyframes bSh {
        0%,
        100% {
          opacity: 0;
          transform: translate(0, 0);
        }
        8% {
          opacity: 0;
        }
        8.1% {
          opacity: 1;
          transform: translate(3px, -2px);
        }
        8.2% {
          opacity: 0;
          transform: translate(-2px, 1px);
        }
        8.3% {
          opacity: 1;
          transform: translate(-3px, -1px);
        }
        8.5% {
          opacity: 1;
          transform: translate(1px, -2px);
        }
        8.7% {
          opacity: 0.8;
          transform: translate(-2px, 0);
        }
        9% {
          opacity: 0.5;
        }
        9.2% {
          opacity: 0;
          transform: translate(0, 0);
        }
        32% {
          opacity: 0;
        }
        32.1% {
          opacity: 1;
          transform: translate(-3px, 1px);
        }
        32.3% {
          opacity: 1;
          transform: translate(3px, 1px);
        }
        32.5% {
          opacity: 0.9;
          transform: translate(1px, -1px);
        }
        32.6% {
          opacity: 0;
        }
        58% {
          opacity: 0;
        }
        58.1% {
          opacity: 1;
          transform: translate(2px, -1px);
        }
        58.25% {
          opacity: 0;
          transform: translate(-3px, 2px);
        }
        58.4% {
          opacity: 0.7;
        }
        58.5% {
          opacity: 0;
        }
        80% {
          opacity: 0;
        }
        80.1% {
          opacity: 1;
          transform: translate(-2px, -2px);
        }
        80.3% {
          opacity: 1;
          transform: translate(-1px, 2px);
        }
        80.5% {
          opacity: 0.6;
        }
        80.9% {
          opacity: 0;
          transform: translate(0, 0);
        }
      }

      @keyframes bSp {
        0%,
        100% {
          opacity: 0;
          transform: translate(0, 0);
        }
        8.1% {
          opacity: 0.7;
          transform: translate(-4px, 0);
          color: rgba(0, 204, 80, 0.6);
        }
        8.4% {
          opacity: 0.5;
          transform: translate(4px, 1px);
          color: rgba(139, 92, 246, 0.5);
        }
        9% {
          opacity: 0;
        }
        32.1% {
          opacity: 0.6;
          transform: translate(3px, -1px);
          color: rgba(0, 204, 80, 0.5);
        }
        32.4% {
          opacity: 0;
        }
        58.1% {
          opacity: 0.5;
          transform: translate(-3px, 1px);
          color: rgba(160, 104, 32, 0.5);
        }
        58.4% {
          opacity: 0;
        }
        80.1% {
          opacity: 0.7;
          transform: translate(-4px, 0);
          color: rgba(139, 92, 246, 0.5);
        }
        80.9% {
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .share-brand .saur {
          animation: none;
          color: var(--green);
        }

        .share-brand .saur::before,
        .share-brand .saur::after {
          animation: none;
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="share-intro" id="shareIntro" hidden>
        <a class="share-brand" href="/" aria-label="Go to the FONOSAUR world">
          <span class="fono">FONO</span><span class="saur">SAUR</span>
        </a>
        <p class="share-copy">
          This loop was made at <a href="/">fonosaur.com</a>
        </p>
        <a class="share-explore" href="/">Make your own &#9656;</a>
      </section>
      <div class="device">
        <div class="skin" id="skin"></div>
        <div class="skinveil"></div>

        <div class="device-ui">
          <div class="mode-switch" role="tablist" aria-label="Sampler mode">
            <button
              class="mode-btn is-active"
              id="padsModeBtn"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="padsPage"
            >
              PADS
            </button>
            <button
              class="mode-btn"
              id="fxModeBtn"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="fxPage"
            >
              FX
            </button>
          </div>

          <section class="lcd" aria-live="polite">
            <div class="lcd-top">
              <div class="lcd-status" id="lcdStatus">READY</div>
              <div class="lcd-tools">
                <button
                  class="lcd-tool-btn quant-btn"
                  id="quantBtn"
                  type="button"
                  aria-pressed="true"
                  aria-label="Turn quantise off"
                  title="Quantise"
                >
                  Q16
                </button>
                <button
                  class="lcd-tool-btn"
                  id="metroBtn"
                  type="button"
                  aria-pressed="true"
                  aria-label="Turn metronome off"
                  title="Metronome"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M7 20.5h10L14.7 4h-5.4L7 20.5Z"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.8"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M12 8.5l3.4 5.1"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.8"
                      stroke-linecap="round"
                    />
                    <circle cx="15.7" cy="13.9" r="1.45" fill="currentColor" />
                    <path
                      d="M10 4h4"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.8"
                      stroke-linecap="round"
                    />
                  </svg>
                </button>
                <div class="info-wrap" id="infoWrap">
                  <button
                    class="lcd-tool-btn info-btn"
                    id="infoBtn"
                    type="button"
                    aria-label="Show keyboard map"
                    aria-expanded="false"
                    aria-controls="infoPanel"
                    title="Keyboard map"
                  ></button>
                </div>
              </div>
            </div>

            <div class="info-panel" id="infoPanel" role="status">
              Tap pads or use the keyboard
              <b>1 2 3 4 / Q W E R / A S D F / Z X C V</b>
            </div>

            <div class="lcd-main">
              <div class="lcd-meta">
                <div class="lcd-bars" id="lcdBars">
                  <span class="lcd-number">4</span> BARS
                  <span class="lcd-divider">&middot;</span>
                  <span class="lcd-number">105</span> BPM
                </div>
                <div class="lcd-stepper" aria-label="Tempo locked at 105 BPM">
                  <span class="lcd-number" id="bpmTxt">105</span>
                  <span>BPM</span>
                </div>
              </div>

              <div class="lcd-message" id="lcdMessage">READY TO RECORD</div>

              <div class="lcd-countdown" id="lcdCountdown" hidden>
                <span class="lcd-number" data-count="4">4</span>
                <span class="lcd-number" data-count="3">3</span>
                <span class="lcd-number" data-count="2">2</span>
                <span class="lcd-number" data-count="1">1</span>
              </div>
            </div>

            <div class="lcd-steps" id="lcdSteps" aria-hidden="true">
              <span></span><span></span><span></span><span></span> <span></span
              ><span></span><span></span><span></span> <span></span><span></span
              ><span></span><span></span> <span></span><span></span><span></span
              ><span></span>
            </div>
          </section>

          <div class="transport">
            <button
              class="transport-btn"
              id="playBtn"
              type="button"
              aria-label="Play loop"
              title="Play loop"
            >
              <span class="transport-icon" id="playIcon">&#9654;</span>
              <span id="playLabel">PLAY</span>
            </button>
            <button
              class="transport-btn"
              id="recBtn"
              type="button"
              aria-label="Record loop"
              title="Record loop"
            >
              <span class="record-dot" id="recDot"></span>
              <span>REC</span>
            </button>
            <button
              class="transport-btn"
              id="clearBtn"
              type="button"
              aria-label="Clear loop"
              title="Clear loop"
            >
              <span class="transport-icon">&#8635;</span>
              <span>CLEAR</span>
            </button>
            <button
              class="transport-btn"
              id="undoBtn"
              type="button"
              aria-label="Undo last overdub layer"
              title="Undo last overdub layer"
            >
              <span class="transport-icon">&#8630;</span>
              <span>UNDO</span>
            </button>
            <button
              class="transport-btn"
              id="shareBtn"
              type="button"
              aria-label="Copy share link"
              title="Copy share link"
            >
              <span class="transport-icon">&#8599;</span>
              <span id="shareLabel">SHARE</span>
            </button>
          </div>

          <div
            class="pad-zone"
            id="padsPage"
            role="tabpanel"
            aria-labelledby="padsModeBtn"
          >
            <div class="grid" id="grid"></div>
          </div>

          <div
            class="fx-zone"
            id="fxPage"
            role="tabpanel"
            aria-labelledby="fxModeBtn"
            hidden
          >
            <div
              class="xy-pad"
              id="xyPad"
              role="application"
              aria-label="Assignable XY effects pad"
            >
              <div class="axis-picker y-axis">
                <button
                  class="axis-btn"
                  id="yAxisBtn"
                  type="button"
                  aria-haspopup="true"
                  aria-expanded="false"
                  aria-controls="yAxisMenu"
                >
                  Y: FILTER
                </button>
                <div class="axis-menu" id="yAxisMenu" hidden></div>
              </div>
              <div class="axis-picker x-axis">
                <button
                  class="axis-btn"
                  id="xAxisBtn"
                  type="button"
                  aria-haspopup="true"
                  aria-expanded="false"
                  aria-controls="xAxisMenu"
                >

        return function () {
          a |= 0;
          a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };

        const arr = await resp.arrayBuffer();
        const buf = await (
          ctx || new (window.AudioContext || window.webkitAudioContext)()
        ).decodeAudioData(arr);
        bufferCache[url] = buf;
        return buf;

      // ---------- kit generation ----------
      function pickOther(notes, rootNote, rnd) {
        const others = notes.filter(function (n) {
          return n !== rootNote;

        return others[Math.floor(rnd() * others.length)];
      }

      function buildKit(s) {
        seed = s >>> 0;
        const rnd = mulberry32(seed);

        // 1. Pick progression
        const progIdx = Math.floor(rnd() * PROGRESSIONS.length);
        const prog = PROGRESSIONS[progIdx];
        const notes = PENT_NOTES[prog];
        const rootNote = notes[0];

        // 2. Drums
        const kickIdx = Math.floor(rnd() * KICK_FILES.length);
        const snareIdx = Math.floor(rnd() * SNARE_FILES.length);
        const hatIdx = Math.floor(rnd() * HIHAT_MACHINES.length);
        const clapIdx = Math.floor(rnd() * CLAP_FILES.length);
        const percIdx = Math.floor(rnd() * PERC_FILES.length);
        const voxIdx = Math.floor(rnd() * VOX_FILES.length);
        const sirenIdx = Math.floor(rnd() * SIREN_FILES.length);

        // 3. Triad instrument (strings only) + notes
        const triadInstIdx = Math.floor(rnd() * TRIAD_INSTRUMENTS.length);
        const triadInst = TRIAD_INSTRUMENTS[triadInstIdx];
        const triadOther = pickOther(notes, rootNote, rnd);

        // 4. Single instrument + notes
        const singleInstIdx = Math.floor(rnd() * SINGLE_INSTRUMENTS.length);
        const singleInst = SINGLE_INSTRUMENTS[singleInstIdx];
        const singleOther = pickOther(notes, rootNote, rnd);

        const hatMachine = HIHAT_MACHINES[hatIdx];

        kit = [

      // ---------- procedural collage skin ----------
      function bust(x, y, s, fill) {
        return (
          '<path transform="translate(' +
          x +
          "," +
          y +
          ") scale(" +
          s +
          ')" fill="' +
          fill +
          '" d="M40 4c18 0 30 15 30 34 0 11-5 17-5 25l7 8-9 4 2 13c0 9-9 15-20 15-17 0-30-9-30-30 0-9 2-13 2-22C19 26 22 4 40 4z"/>'
        );
      }

      function rings(cx, cy, r, st) {
        let out = "";
        for (let i = 0; i < 3; i++) {
          out +=
            '<ellipse cx="' +
            cx +
            '" cy="' +
            cy +
            '" rx="' +
            (r + i * r * 0.5) +
            '" ry="' +
            (r + i * r * 0.5) * 0.36 +
            '" fill="none" stroke="' +
            st +
            '" stroke-width="' +
            (1.6 - i * 0.4) +
            '" opacity="' +
            (0.7 - i * 0.18) +
            '" transform="rotate(-20 ' +
            cx +
            " " +
            cy +
            ')"/>';
        }
        return (
          '<circle cx="' +
          cx +
          '" cy="' +
          cy +
          '" r="' +
          r * 0.5 +
          '" fill="' +
          st +
          '"/>' +
          out
        );
      }

      function bird(x, y, s, fill) {

      function leaf(x, y, s, rot, fill) {

      const SKIN_PAL = ["#3b8bff", "#8b5cf6", "#a06820", "#00cc50"];

      function skinURI(sd) {
        const p = mulberry32(sd);
        const R = () => p();
        const W = 520;
        const H = 520;
        const a = SKIN_PAL[Math.floor(R() * 4)];
        const b = SKIN_PAL[Math.floor(R() * 4)];
        return (
          "data:image/svg+xml;utf8," +

              H +

              '">' +

              '<pattern id="h" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(' +
              R() * 40 +
              ')"><circle cx="2.2" cy="2.2" r="1.4" fill="#000" opacity=".15"/></pattern>' +

              '<rect width="' +
              W +
              '" height="' +
              H +
              '" fill="' +
              a +
              '"/>' +

              W +
              ",0 " +
              W +
              "," +

              " 0," +
              H * 0.78 +
              '" fill="' +

              " " +
              W +
              "," +

              leaf(W * 0.14, H * 0.32, 1.5, -22, "#0d0d10") +

              '" height="' +
              H +
              '" fill="url(#h)"/>' +
              '<rect width="' +
              W +
              '" height="' +
              H +
              '" filter="url(#g)" opacity=".35"/>' +
              "</svg>",
          )
        );
      }

      // ---------- audio ----------
      let ctx;
      let master;
      let fxInput;
      let fxDry;
