      let fxLowpass;
      let fxLowGain;
      let fxHighpass;
      let fxHighGain;
      let fxDelay;
      let fxDelayFeedback;
      let fxDelayFilter;
      let fxDelayWet;
      let fxPhaserOut;
      let fxPhaserDry;
      let fxPhaserWet;
      let fxPhaserStages;
      let fxPhaserOsc;
      let fxPhaserLfoGain;
      let fxReverbSend;
      let fxReverbConv;
      let noiseBuf;
      const liveSources = new Set();

      function initAudio() {
        if (ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        master = ctx.createDynamicsCompressor();
        master.threshold.value = -14;
        master.ratio.value = 4;
        master.release.value = 0.25;
        const g = ctx.createGain();
        g.gain.value = 0.9;
        master.connect(g).connect(ctx.destination);

        const len = ctx.sampleRate * 1.4;
        const ir = ctx.createBuffer(2, len, ctx.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
          const d = ir.getChannelData(ch);
          for (let i = 0; i < len; i++) {
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.6);
          }
        }
        const conv = ctx.createConvolver();
        conv.buffer = ir;
        const rev = ctx.createGain();
        rev.gain.value = 0.16;
        conv.connect(rev).connect(master);
        master._conv = conv;

        fxInput = ctx.createGain();
        fxFilterOut = ctx.createGain();
        fxFilterDry = ctx.createGain();
        fxLowpass = ctx.createBiquadFilter();
        fxLowGain = ctx.createGain();
        fxHighpass = ctx.createBiquadFilter();
        fxHighGain = ctx.createGain();
        fxDry = ctx.createGain();
        fxDelay = ctx.createDelay(3);
        fxDelayFeedback = ctx.createGain();
        fxDelayFilter = ctx.createBiquadFilter();
        fxDelayWet = ctx.createGain();
        fxPhaserOut = ctx.createGain();
        fxPhaserDry = ctx.createGain();
        fxPhaserWet = ctx.createGain();
        fxPhaserLfoGain = ctx.createGain();
        fxReverbSend = ctx.createGain();
        fxReverbConv = ctx.createConvolver();
        fxPhaserStages = [420, 690, 1120, 1780].map((frequency) => {
          const stage = ctx.createBiquadFilter();
          stage.type = "allpass";
          stage.frequency.value = frequency;
          stage.Q.value = 1.2;
          return stage;
        });

        fxLowpass.type = "lowpass";
        fxHighpass.type = "highpass";
        fxDelayFilter.type = "lowpass";
        fxDelayFilter.frequency.value = 2600;
        fxDelayFeedback.gain.value = 0.36;
        fxDelayWet.gain.value = 0;
        fxDry.gain.value = 1;
        fxPhaserDry.gain.value = 1;
        fxPhaserWet.gain.value = 0;
        fxReverbSend.gain.value = 0;

        const fxRevLen = ctx.sampleRate * 2.4;
        const fxIr = ctx.createBuffer(2, fxRevLen, ctx.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
          const d = fxIr.getChannelData(ch);
          for (let i = 0; i < fxRevLen; i++) {
            const decay = Math.pow(1 - i / fxRevLen, 2.15);
            d[i] = (Math.random() * 2 - 1) * decay;
          }
        }
        fxReverbConv.buffer = fxIr;

        fxInput.connect(fxFilterDry).connect(fxFilterOut);
        fxInput.connect(fxLowpass).connect(fxLowGain).connect(fxFilterOut);
        fxInput.connect(fxHighpass).connect(fxHighGain).connect(fxFilterOut);
        fxFilterOut.connect(fxPhaserDry).connect(fxPhaserOut);
        fxFilterOut.connect(fxPhaserStages[0]);
        fxPhaserStages.forEach((stage, index) => {
          if (index < fxPhaserStages.length - 1) {
            stage.connect(fxPhaserStages[index + 1]);
          } else {
            stage.connect(fxPhaserWet).connect(fxPhaserOut);
          }
          fxPhaserLfoGain.connect(stage.frequency);
        });
        fxPhaserOsc = ctx.createOscillator();
        fxPhaserOsc.type = "sine";
        fxPhaserOsc.frequency.value = 0.28;
        fxPhaserLfoGain.gain.value = 0;
        fxPhaserOsc.connect(fxPhaserLfoGain);
        fxPhaserOsc.start();
        fxPhaserOut.connect(fxDry);
        fxPhaserOut.connect(fxDelay);
        fxPhaserOut.connect(fxReverbSend).connect(fxReverbConv).connect(master);
        fxDelay
          .connect(fxDelayFilter)
          .connect(fxDelayFeedback)
          .connect(fxDelay);
        fxDelay.connect(fxDelayWet);
        connectFxOutput(fxDry);
        connectFxOutput(fxDelayWet);
        applyFxNeutral(true);

        const nl = ctx.sampleRate * 0.5;
        noiseBuf = ctx.createBuffer(1, nl, ctx.sampleRate);
        const nd = noiseBuf.getChannelData(0);
        for (let i = 0; i < nl; i++) nd[i] = Math.random() * 2 - 1;
      }

      function resumeAudio() {
        initAudio();
        if (ctx && ctx.state === "suspended") ctx.resume();
      }

      function connectFxOutput(node) {
        node.connect(master);
        node.connect(master._conv);
      }

      function connectToFx(node) {
        if (fxInput) {
          node.connect(fxInput);
        } else if (master) {
          node.connect(master);
          node.connect(master._conv);
        }
      }

      function delaySecondsFromX(x) {
        const barSeconds = (4 * beatMs()) / 1000;
        return barSeconds / Math.pow(2, x * 5);
      }

      function delaySecondsFromValue(value) {
        const barSeconds = (4 * beatMs()) / 1000;
        return barSeconds / Math.pow(2, value * 5);
      }

      function setAudioParam(param, value, ramp = 0.035) {
        if (!ctx || !param) return;
        const now = ctx.currentTime;
        param.cancelScheduledValues(now);
        param.setTargetAtTime(value, now, ramp);
      }

      function neutralFilter(ramp) {
        if (!ctx || !fxInput) return;
        setAudioParam(fxFilterDry.gain, 1, ramp);
        setAudioParam(fxLowGain.gain, 0, ramp);
        setAudioParam(fxHighGain.gain, 0, ramp);
        setAudioParam(fxLowpass.frequency, 20000, ramp);
        setAudioParam(fxHighpass.frequency, 22, ramp);
      }

      function neutralDelay(ramp) {
        if (!ctx || !fxInput) return;
        setAudioParam(fxDelay.delayTime, delaySecondsFromValue(0.5), ramp);
        setAudioParam(fxDelayFeedback.gain, 0.22, Math.max(ramp, 0.22));
        setAudioParam(fxDelayWet.gain, 0, Math.max(ramp, 0.55));
      }

      function neutralPhaser(ramp) {
        if (!ctx || !fxInput) return;
        setAudioParam(fxPhaserDry.gain, 1, ramp);
        setAudioParam(fxPhaserWet.gain, 0, ramp);
        setAudioParam(fxPhaserLfoGain.gain, 0, ramp);
        setAudioParam(fxPhaserOsc.frequency, 0.28, ramp);
        fxPhaserStages.forEach((stage, index) => {
          setAudioParam(stage.frequency, [420, 690, 1120, 1780][index], ramp);
          setAudioParam(stage.Q, 1.2, ramp);
        });
      }

      function neutralReverb(ramp) {
        if (!ctx || !fxInput) return;
        setAudioParam(fxReverbSend.gain, 0, Math.max(ramp, 0.18));
      }

      function setPitchRate(rate, ramp = 0.035) {
        runtime.fxPitchRate = rate;
        if (!ctx) return;
        const now = ctx.currentTime;
        liveSources.forEach((src) => {
          try {
            src.playbackRate.cancelScheduledValues(now);
            src.playbackRate.setTargetAtTime(rate, now, ramp);
          } catch (e) {
            /* source may already be gone */
          }
        });
      }

      function neutralPitch(ramp) {
        setPitchRate(1, ramp);
      }

      function applyFilterValue(value, active) {
        const lowAmount = Math.max(0, (0.5 - value) * 2);
        const highAmount = Math.max(0, (value - 0.5) * 2);
        const filterAmount = Math.max(highAmount, lowAmount);
        const dryAmount = 1 - filterAmount;
        const lowFreq = 20000 * Math.pow(180 / 20000, lowAmount);
        const highFreq = 22 * Math.pow(3200 / 22, highAmount);
        const ramp = active ? 0.035 : 0.08;
        setAudioParam(fxFilterDry.gain, dryAmount, ramp);
        setAudioParam(fxLowGain.gain, lowAmount, ramp);
        setAudioParam(fxHighGain.gain, highAmount, ramp);
        setAudioParam(fxLowpass.frequency, lowFreq, ramp);
        setAudioParam(fxHighpass.frequency, highFreq, ramp);
      }

      function applyDelayValue(value, active) {
        setAudioParam(
          fxDelay.delayTime,
          delaySecondsFromValue(value),
          active ? 0.012 : 0.055,
        );
        setAudioParam(
          fxDelayFeedback.gain,
          active ? 0.42 : 0.28,
          active ? 0.04 : 0.22,
        );
        setAudioParam(
          fxDelayWet.gain,
          active ? 0.32 : 0,
          active ? 0.035 : 0.55,
        );
      }

      function applyPhaserValue(value, active) {
        const ramp = active ? 0.035 : 0.12;
        const shaped = Math.pow(value, 0.85);
        const rate = 0.08 + shaped * 2.1;
        const depth = 120 + shaped * 980;
        const wet = 0.18 + shaped * 0.5;
        setAudioParam(fxPhaserDry.gain, 0.9 - shaped * 0.2, ramp);
        setAudioParam(fxPhaserWet.gain, wet, ramp);
        setAudioParam(fxPhaserLfoGain.gain, depth, ramp);
        setAudioParam(fxPhaserOsc.frequency, rate, ramp);
        fxPhaserStages.forEach((stage, index) => {
          const base = [360, 620, 980, 1480][index] * (0.85 + shaped * 0.45);
          setAudioParam(stage.frequency, base, ramp);
          setAudioParam(stage.Q, 0.9 + shaped * 5.2, ramp);
        });
      }

      function applyReverbValue(value, active) {
        const shaped = Math.pow(value, 1.08);
        setAudioParam(
          fxReverbSend.gain,
          active ? shaped * 0.72 : 0,
          active ? 0.05 : 0.22,
        );
      }

      function pitchRateFromValue(value) {
        const minRate = 0.58;
        const maxRate = 1.72;
        if (value < 0.5) {
          return minRate * Math.pow(1 / minRate, value / 0.5);
        }
        return Math.pow(maxRate, (value - 0.5) / 0.5);
      }

      function applyPitchValue(value, active) {
        setPitchRate(
          active ? pitchRateFromValue(value) : 1,
          active ? 0.035 : 0.08,
        );
      }

      const EFFECT_BANK = [
        {
          id: "filter",
          label: "FILTER",
          ranges: {
            x: { min: "Lowpass", max: "Highpass" },
            y: { min: "Lowpass", max: "Highpass" },
          },
          apply: applyFilterValue,
          neutral: neutralFilter,
        },
        {
          id: "delay",
          label: "DELAY",
          ranges: {
            x: { min: "1 bar", max: "1/32" },
            y: { min: "1 bar", max: "1/32" },
          },
          apply: applyDelayValue,
          neutral: neutralDelay,
        },
        {
          id: "phaser",
          label: "PHASER",
          ranges: {
            x: { min: "Slow", max: "Fast" },
            y: { min: "Slow", max: "Fast" },
          },
          apply: applyPhaserValue,
          neutral: neutralPhaser,
        },
        {
          id: "reverb",
          label: "REVERB",
          ranges: {
            x: { min: "Dry", max: "Wet" },
            y: { min: "Dry", max: "Wet" },
          },
          apply: applyReverbValue,
          neutral: neutralReverb,
        },
        {
          id: "pitch",
          label: "PITCH",
          ranges: {
            x: { min: "Slow/low", max: "Fast/high" },
            y: { min: "Slow/low", max: "Fast/high" },
          },
          apply: applyPitchValue,
          neutral: neutralPitch,
        },
      ];

      function effectById(id) {
        return EFFECT_BANK.find((effect) => effect.id === id) || EFFECT_BANK[0];
      }

      function axisValue(axis, x, y) {
        return axis === "x" ? x : 1 - y;
      }

      function neutralAllEffects(ramp) {
        EFFECT_BANK.forEach((effect) => effect.neutral(ramp));
      }

      function assignedEffectIds() {
        return new Set(Object.values(runtime.fxAssignments));
      }

      function applyFxPosition(x, y, active) {
        if (!ctx || !fxInput) return;
        const assigned = assignedEffectIds();
        EFFECT_BANK.forEach((effect) => {
          if (!assigned.has(effect.id)) effect.neutral(active ? 0.04 : 0.08);
        });
        Object.entries(runtime.fxAssignments).forEach(([axis, effectId]) => {
          effectById(effectId).apply(axisValue(axis, x, y), active);
        });
      }

      function applyFxNeutral(immediate) {
        runtime.fxX = 0.5;
        runtime.fxY = 0.5;
        if (!ctx || !fxInput) return;
        neutralAllEffects(immediate ? 0.001 : 0.08);
      }

      function noteFreq(m) {
        return 440 * Math.pow(2, (m - 69) / 12);
      }

      function env(g, t, a, d, peak) {
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(peak, t + a);
        g.gain.exponentialRampToValueAtTime(0.0008, t + a + d);
      }

      function snd(node) {
        connectToFx(node);
      }

      function playClick(accent) {
        if (!metronomeOn) return;
        resumeAudio();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "square";
        osc.frequency.setValueAtTime(accent ? 1400 : 980, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(accent ? 0.14 : 0.09, t + 0.002);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.055);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t);
        osc.stop(t + 0.07);
      }

      // Choke groups: voices in the same group cut each other off
      const chokeVoices = { rhodes: null, hat: null };

      function chokeGroup(padIndex) {
        const k = kit[padIndex];
        if (k.cat === "rhodes") return "rhodes";
        if (k.cat === "hat") return "hat";
        return null;
      }

      function play(file, padIndex) {
        if (!ctx) return;
        const url = soundURL(file);
        const buf = bufferCache[url];
        if (!buf) return;
        const t = ctx.currentTime;
        const group = padIndex !== undefined ? chokeGroup(padIndex) : null;

        // Choke: fade out previous voice in same group
        if (group && chokeVoices[group]) {
          const prev = chokeVoices[group];
          try {
            prev.gain.cancelScheduledValues(t);
            prev.gain.setValueAtTime(prev.gain.value, t);
            prev.gain.linearRampToValueAtTime(0, t + 0.015);
            prev.src.stop(t + 0.02);
          } catch (e) {
            /* already stopped */
          }
        }

        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.playbackRate.value = runtime.fxPitchRate || 1;
        const g = ctx.createGain();
        g.gain.value = 1;
        src.connect(g);
        connectToFx(g);
        liveSources.add(src);
        src.onended = () => liveSources.delete(src);
        src.start(t);

        if (group) {
          chokeVoices[group] = { src: src, gain: g.gain };
        }
      }

      // ---------- UI helpers ----------
      function beatMs() {
        return 60000 / bpm;
      }

      function fixedLoopLength() {
        return LOOP_BARS * 4 * beatMs();
      }

      function hasMobileTiming() {
        const coarsePointer =
          window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
        const compactViewport =
          window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
        return (
          navigator.maxTouchPoints > 0 && (coarsePointer || compactViewport)
        );
      }

      function boundaryGraceMs(targetLength) {
        const rawGrace = hasMobileTiming()
          ? MOBILE_LOOP_BOUNDARY_GRACE_MS
          : LOOP_BOUNDARY_GRACE_MS;
        const firstStep = targetLength / QUANTIZE_STEPS;
        return Math.min(
          rawGrace,
          Math.max(LOOP_BOUNDARY_GRACE_MS, firstStep - 10),
        );
      }

      function isNearLoopBoundary(t, targetLength) {
        const grace = boundaryGraceMs(targetLength);
        return t <= grace || targetLength - t <= grace;
      }

      function wrapLoopTime(t, targetLength) {
        if (!targetLength || targetLength <= 0) return 0;
        const wrapped = ((t % targetLength) + targetLength) % targetLength;
        return wrapped >= targetLength - 0.0001 ? 0 : wrapped;
      }

      function syncLoopEvents() {
        loop.events = [];
        loop.layers.forEach((layer) => {
          layer.events.forEach(([i, t]) => {
            loop.events.push([i, t]);
          });
        });
        loop.events.sort((a, b) => a[1] - b[1]);
      }

      function normalizeLayer(events, targetLength) {
        return events
          .map(([i, t]) => [i, wrapLoopTime(t, targetLength)])
          .sort((a, b) => a[1] - b[1]);
      }

      function quantizeLayer(events, targetLength) {
        const normalized = normalizeLayer(events, targetLength);
        if (!quantizeOn || !normalized.length) return normalized;
        const step = targetLength / QUANTIZE_STEPS;
        return normalizeLayer(
          normalized.map(([i, t]) => {
            if (isNearLoopBoundary(t, targetLength)) {
              return [i, 0];
            }
            const nearestStep = Math.round(t / step);
            if (nearestStep <= 0 || nearestStep >= QUANTIZE_STEPS) {
              return [i, 0];
            }
            const nearest = nearestStep * step;
            return [i, t + (nearest - t) * QUANTIZE_BLEND];
          }),
          targetLength,
        );
      }

      function resetLoopData() {
        loop.layers = [];
        loop.events = [];
        loop.length = fixedLoopLength();
      }

      function retimeLoop(nextLength) {
        if (!loop.layers.length || !loop.length || loop.length === nextLength) {
          loop.length = nextLength;
          return;
        }
        const scale = nextLength / loop.length;
        loop.layers = loop.layers.map((layer) => ({
          events: layer.events.map(([i, t]) => [i, t * scale]),
        }));
        loop.length = nextLength;
        syncLoopEvents();
      }

      function syncDeviceFrame() {
        const wrapStyle = getComputedStyle(wrapEl);
        const padY =
          parseFloat(wrapStyle.paddingTop || 0) +
          parseFloat(wrapStyle.paddingBottom || 0);
        const gap = parseFloat(wrapStyle.rowGap || wrapStyle.gap || 0);
        const siblings = Array.from(wrapEl.children).filter(
          (child) =>
            child !== deviceEl && getComputedStyle(child).display !== "none",
        );
        const extrasHeight = siblings.reduce(
          (sum, child) => sum + child.getBoundingClientRect().height,
          0,
        );
        const availableHeight = Math.max(
          392,
          window.innerHeight - padY - extrasHeight - gap * siblings.length,
        );
        const horizontalReserve =
          window.innerWidth <= 360 ? 34 : window.innerWidth <= 420 ? 20 : 0;
        const availableWidth = Math.max(
          260,
          wrapEl.clientWidth - horizontalReserve,
        );
        const widthFromHeight = availableHeight * DEVICE_RATIO;
        const targetWidth = Math.min(
          DEVICE_MAX_WIDTH,
          availableWidth,
          widthFromHeight,
        );
        const targetHeight = targetWidth / DEVICE_RATIO;
        deviceEl.style.width = Math.round(targetWidth) + "px";
        deviceEl.style.height = Math.round(targetHeight) + "px";
      }

      function setInfoOpen(open) {
        infoWrap.dataset.open = open ? "true" : "false";
        infoBtn.setAttribute("aria-expanded", open ? "true" : "false");
        lcdEl.classList.toggle("show-info", open);
      }

      function showToast(message) {
        if (!toastEl) return;
        toastEl.textContent = message;
        toastEl.classList.add("is-visible");
        window.clearTimeout(toastTimer);
        toastTimer = window.setTimeout(() => {
          toastEl.classList.remove("is-visible");
        }, 1900);
      }

      function resetShareFeedback() {
        shareBtn.classList.remove("is-copied");
        shareLabel.textContent = "SHARE";
        shareBtn.setAttribute("aria-label", "Copy share link");
        shareBtn.setAttribute("title", "Copy share link");
      }

      function flashShareFeedback() {
        shareBtn.classList.add("is-copied");
        shareLabel.innerHTML = "COPIED &#10003;";
        shareBtn.setAttribute("aria-label", "Link copied");
        shareBtn.setAttribute("title", "Link copied");
        window.clearTimeout(shareTimer);
        shareTimer = window.setTimeout(() => {
          resetShareFeedback();
        }, 2000);
      }

      function updateShareIntro() {
        if (!shareIntroEl) return;
        const show = runtime.loadedStandaloneShare && loop.events.length > 0;
        shareIntroEl.hidden = !show;
      }

      function prefersNativeShare() {
        return (
          typeof navigator !== "undefined" &&
          typeof navigator.share === "function" &&
          window.isSecureContext &&
          (navigator.maxTouchPoints > 0 ||
            (window.matchMedia &&
              (window.matchMedia("(pointer: coarse)").matches ||
                window.matchMedia("(max-width: 768px)").matches)))
        );
      }

      async function copyShareLink(url) {
        if (navigator.clipboard) {
          try {
            await navigator.clipboard.writeText(url);
          } catch (error) {}
        }
        flashShareFeedback();
        showToast("Link copied - your kit + loop");
      }

      function nativeShareData(url) {
        return {
          title: "FONOSAUR",
          text: SHARE_MESSAGE,
          url,
        };
      }

      function canNativeShare(data) {
        if (!prefersNativeShare()) return false;
        try {
          if (navigator.canShare && !navigator.canShare(data)) return false;
        } catch (error) {
          return false;
        }
        return true;
      }

      function flashNativeShareFeedback() {
        shareBtn.classList.add("is-copied");
        shareLabel.innerHTML = "SHARED &#10003;";
        shareBtn.setAttribute("aria-label", "Shared");
        shareBtn.setAttribute("title", "Shared");
        window.clearTimeout(shareTimer);
        shareTimer = window.setTimeout(() => {
          resetShareFeedback();
        }, 2000);
      }

      function shareCurrentLink(url) {
        const data = nativeShareData(url);
        if (canNativeShare(data)) {
          // Call directly from the tap/click stack so mobile browsers keep
          // the transient user activation required by the Web Share API.
          navigator
            .share(data)
            .then(() => {
              flashNativeShareFeedback();
            })
            .catch((error) => {
              if (error && error.name === "AbortError") return;
              copyShareLink(url);
            });
          return;
        }

        copyShareLink(url);
      }

      function standaloneShareUrl(encodedLoop) {
        const url = new URL(location.href);
        url.search = "";
        url.hash = encodedLoop;
        return url.href;
      }

      function updateBarsReadout() {
        bpmTxt.textContent = String(bpm);
        lcdBars.innerHTML =
          '<span class="lcd-number">' +
          LOOP_BARS +
          '</span> BARS <span class="lcd-divider">&middot;</span> <span class="lcd-number">' +
          bpm +
          "</span> BPM";
      }

      function updateMetroButton() {
        metroBtn.classList.toggle("off", !metronomeOn);
        metroBtn.setAttribute("aria-pressed", String(metronomeOn));
        metroBtn.setAttribute(
          "aria-label",
          metronomeOn ? "Turn metronome off" : "Turn metronome on",
        );
      }

      function updateQuantButton() {
        quantBtn.classList.toggle("off", !quantizeOn);
        quantBtn.setAttribute("aria-pressed", String(quantizeOn));
        quantBtn.setAttribute(
          "aria-label",
          quantizeOn ? "Turn quantise off" : "Turn quantise on",
        );
        quantBtn.setAttribute(
          "title",
          quantizeOn ? "Quantise on" : "Quantise off",
        );
      }

      function hideCountdown() {
        lcdCountdown.hidden = true;
        countdownDigits.forEach((digit) => {
          digit.classList.remove("is-live", "is-done");
        });
      }

      function showCountdown(activeValue) {
        lcdCountdown.hidden = false;
        countdownDigits.forEach((digit) => {
          const n = Number(digit.dataset.count);
          digit.classList.toggle("is-live", n === activeValue);
          digit.classList.toggle("is-done", n > activeValue);
        });
      }

      function clearStepReadout() {
        stepCells.forEach((cell) => {
          cell.classList.remove("is-on", "is-active");
        });
      }

      function renderStepReadout(progress, total) {
        if (!total || total <= 0) {
          clearStepReadout();
          return;
        }
        const ratio = Math.max(0, Math.min(progress / total, 0.9999));
        const activeStep = Math.min(
          DISPLAY_STEPS - 1,
          Math.floor(ratio * DISPLAY_STEPS),
        );
        stepCells.forEach((cell, index) => {
          cell.classList.toggle("is-on", index < activeStep);
          cell.classList.toggle("is-active", index === activeStep);
        });
      }

      function currentIdleMessage() {
        if (runtime.loadedFromShare && loop.events.length)
          return "SHARED LOOP READY";
        if (loop.events.length) return "LOOP READY \u00b7 REC TO DUB";
        return "READY TO RECORD";
      }

      function updateDisplay() {
        updateBarsReadout();
        updateMetroButton();
        updateQuantButton();
        updateShareIntro();

        if (runtime.mode === "countin") {
          lcdStatus.textContent =
            runtime.recordType === "overdub" ? "DUB IN" : "COUNT-IN";
          lcdMessage.textContent =
            runtime.recordType === "overdub"
              ? "OVERDUB STARTS IN"
              : "RECORD STARTS IN";
        } else if (runtime.mode === "recording") {
          lcdStatus.textContent =
            runtime.recordType === "overdub" ? "DUB" : "REC";
          lcdMessage.textContent =
            runtime.recordType === "overdub"
              ? "LAYERING NEW PASS"
              : "CAPTURING 4 BARS";
        } else if (runtime.mode === "playing") {
          lcdStatus.textContent = "PLAY";
          lcdMessage.textContent = runtime.loadedFromShare
            ? "PLAYING SHARED LOOP"
            : "LOOP PLAYBACK";
        } else {
          lcdStatus.textContent =
            runtime.loadedFromShare && loop.events.length ? "SHARED" : "READY";
          lcdMessage.textContent = currentIdleMessage();
        }
      }

      function updateButtons() {
        const live = runtime.mode === "countin" || runtime.mode === "recording";
        const playing = runtime.mode === "playing";
        playBtn.classList.toggle("is-playing", playing);
        recBtn.classList.toggle("is-live", live);
        playIcon.innerHTML = playing ? "&#9632;" : "&#9654;";
        playLabel.textContent = playing ? "STOP" : "PLAY";
        playBtn.setAttribute("aria-label", playing ? "Stop loop" : "Play loop");
        playBtn.setAttribute("title", playing ? "Stop loop" : "Play loop");
        recDot.classList.toggle("is-live", live);
        undoBtn.disabled = loop.layers.length === 0 || live;
      }

      function applySkin() {
        const skin = SKINS[skinIdx] || SKINS[0];
        deviceEl.classList.toggle("has-print-skin", skin?.kind === "image");
        if (!skin || skin.kind === "plain") {
          skinEl.style.backgroundImage = "none";
          skinEl.style.opacity = "0";
          return;
        }
        if (skin.kind === "image") {
          skinEl.style.opacity = "";
          skinEl.style.backgroundImage = 'url("' + skin.src + '")';
          return;
        }
        skinEl.style.opacity = "0.55";
        skinEl.style.backgroundImage = 'url("' + skinURI(skin.seed) + '")';
      }

      function axisUi(axis) {
        return axis === "x"
          ? { button: xAxisBtn, menu: xAxisMenu, min: xAxisMin, max: xAxisMax }
          : { button: yAxisBtn, menu: yAxisMenu, min: yAxisMin, max: yAxisMax };
      }

      function otherAxis(axis) {
        return axis === "x" ? "y" : "x";
      }

      function closeAxisMenus() {
        [xAxisBtn, yAxisBtn].forEach((button) => {
          button.setAttribute("aria-expanded", "false");
        });
        [xAxisMenu, yAxisMenu].forEach((menu) => {
          menu.hidden = true;
        });
      }

      function renderAxisMenu(axis) {
        const ui = axisUi(axis);
        ui.menu.innerHTML = "";
        EFFECT_BANK.forEach((effect) => {
          const option = document.createElement("button");
          option.type = "button";
          option.className = "axis-option";
          option.textContent = effect.label;
          option.disabled =
            effect.id === runtime.fxAssignments[otherAxis(axis)];
          option.classList.toggle(
            "is-selected",
            effect.id === runtime.fxAssignments[axis],
          );
          option.addEventListener("click", (event) => {
            event.stopPropagation();
            if (!option.disabled) setAxisEffect(axis, effect.id);
          });
          ui.menu.appendChild(option);
        });
      }

      function updateAxisLabels() {
        ["x", "y"].forEach((axis) => {
          const ui = axisUi(axis);
          const effect = effectById(runtime.fxAssignments[axis]);
          ui.button.textContent = axis.toUpperCase() + ": " + effect.label;
          ui.min.textContent = effect.ranges[axis].min;
          ui.max.textContent = effect.ranges[axis].max;
        });
        renderAxisMenu("x");
        renderAxisMenu("y");
      }

      function setAxisEffect(axis, effectId) {
        if (runtime.fxAssignments[otherAxis(axis)] === effectId) return;
        runtime.fxAssignments[axis] = effectId;
        updateAxisLabels();
        closeAxisMenus();
        if (runtime.fxTouching) {
          applyFxPosition(runtime.fxX, runtime.fxY, true);
        } else {
          applyFxNeutral(false);
        }
      }

      function toggleAxisMenu(axis) {
        const ui = axisUi(axis);
        const open = ui.menu.hidden;
        closeAxisMenus();
        if (open) {
          renderAxisMenu(axis);
          ui.menu.hidden = false;
          ui.button.setAttribute("aria-expanded", "true");
        }
      }

      function setViewMode(mode) {
        runtime.viewMode = mode;
        const isFx = mode === "fx";
        deviceUiEl.dataset.mode = mode;
        padsPage.hidden = isFx;
        fxPage.hidden = !isFx;
        padsModeBtn.classList.toggle("is-active", !isFx);
        fxModeBtn.classList.toggle("is-active", isFx);
        padsModeBtn.setAttribute("aria-selected", String(!isFx));
        fxModeBtn.setAttribute("aria-selected", String(isFx));
        if (!isFx) {
          stopStutter();
          releaseXyPad();
        }
      }

      function updateXyCursor(x, y, touching) {
        xyCursor.style.left = x * 100 + "%";
        xyCursor.style.top = y * 100 + "%";
        xyPad.classList.toggle("is-touching", touching);
      }

      function setXyFromEvent(event) {
        const rect = xyPad.getBoundingClientRect();
        const x = Math.max(
          0,
          Math.min(1, (event.clientX - rect.left) / rect.width),
        );
        const y = Math.max(
          0,
          Math.min(1, (event.clientY - rect.top) / rect.height),
        );
        runtime.fxX = x;
        runtime.fxY = y;
        updateXyCursor(x, y, true);
        resumeAudio();
        applyFxPosition(x, y, true);
      }

      function releaseXyPad() {
        runtime.fxTouching = false;
        runtime.xyPointerId = null;
        updateXyCursor(0.5, 0.5, false);
        applyFxNeutral(false);
      }

      function stutterIntervalMs() {
        return beatMs() / 4;
      }

      function playbackPositionAt(now) {
        const total = fixedLoopLength();
        if (!total) return 0;
        if (runtime.mode === "playing") {
          return wrapLoopTime(runtime.lastProgress || 0, total);
        }
        return wrapLoopTime(runtime.lastProgress || 0, total);
      }

      function nearestSliceStart(pos, targetLength) {
        if (!loop.events.length || targetLength <= 0) return pos;
        const times = loop.events.map(([i, t]) =>
          loop.length > 0 ? (t / loop.length) * targetLength : t,
        );
        let best = times[0];
        let bestDistance = targetLength;
        times.forEach((t) => {
          const behind = wrapLoopTime(pos - t, targetLength);
          if (behind < bestDistance) {
            bestDistance = behind;
            best = t;
          }
        });
        return best;
      }

      function fireLoopSlice(start, length, targetLength) {
        if (!loop.events.length || targetLength <= 0) return;
        loop.events.forEach(([i, t]) => {
          const scaled = loop.length > 0 ? (t / loop.length) * targetLength : t;
          const offset = wrapLoopTime(scaled - start, targetLength);
          if (offset <= length + 0.0001) hit(i, true);
        });
      }

      function startStutter() {
        resumeAudio();
        if (!loop.events.length) {
          lcdMessage.textContent = "RECORD A LOOP FIRST";
          return;
        }
        if (runtime.mode === "idle") {
          startLoop();
        }
        if (runtime.mode !== "playing") return;
        const now = performance.now();
        const total = fixedLoopLength();
        runtime.stutterActive = true;
        runtime.stutterStartTime = now;
        runtime.stutterLastTick = -1;
        runtime.stutterSliceStart = nearestSliceStart(
          playbackPositionAt(now),
          total,
        );
        stutterBtn.classList.add("is-held");
        stutterBtn.setAttribute("aria-pressed", "true");
      }

      function stopStutter() {
        runtime.stutterActive = false;
        runtime.stutterLastTick = -1;
        runtime.stutterPointerId = null;
        stutterBtn.classList.remove("is-held");
        stutterBtn.setAttribute("aria-pressed", "false");
      }

      function runStutterFrame(now, targetLength) {
        const interval = stutterIntervalMs();
        const tick = Math.floor((now - runtime.stutterStartTime) / interval);
        if (tick === runtime.stutterLastTick) return;
        runtime.stutterLastTick = tick;
        fireLoopSlice(runtime.stutterSliceStart, interval, targetLength);
      }

      padsModeBtn.addEventListener("click", () => setViewMode("pads"));
      fxModeBtn.addEventListener("click", () => setViewMode("fx"));
      xAxisBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleAxisMenu("x");
      });
      yAxisBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleAxisMenu("y");
      });
      [xAxisMenu, yAxisMenu].forEach((menu) => {
        menu.addEventListener("click", (event) => event.stopPropagation());
      });
      document.addEventListener("click", closeAxisMenus);

      xyPad.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".axis-picker")) return;
        event.preventDefault();
        runtime.fxTouching = true;
        runtime.xyPointerId = event.pointerId;
        xyPad.setPointerCapture(event.pointerId);
        setXyFromEvent(event);
      });

      xyPad.addEventListener("pointermove", (event) => {
        if (!runtime.fxTouching || runtime.xyPointerId !== event.pointerId)
          return;
        event.preventDefault();
        setXyFromEvent(event);
      });

      xyPad.addEventListener("pointerup", (event) => {
        if (runtime.xyPointerId !== event.pointerId) return;
        releaseXyPad();
      });

      xyPad.addEventListener("pointercancel", releaseXyPad);

      stutterBtn.setAttribute("aria-pressed", "false");
      stutterBtn.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        runtime.stutterPointerId = event.pointerId;
        stutterBtn.setPointerCapture(event.pointerId);
        startStutter();
      });
      stutterBtn.addEventListener("pointerup", stopStutter);
      stutterBtn.addEventListener("pointercancel", stopStutter);
      stutterBtn.addEventListener("lostpointercapture", stopStutter);

      // ---------- pads ----------
      // Track active touches to prevent double-fire
      const activeTouches = new Map(); // touch identifier -> pad index
      let touchedRecently = false; // suppress mouse click after touch

      function renderPads() {
        grid.innerHTML = "";
        kit.forEach((k, i) => {
          const col = CAT_COLOR[k.cat];
          const d = document.createElement("button");
          d.type = "button";
          d.className = "pad";
          d.dataset.i = i;
          d.setAttribute("aria-label", k.label + " pad, key " + k.key);
          d.setAttribute("aria-keyshortcuts", k.key);
          d.innerHTML =
            '<span class="dot" style="background:' +
            col +
            '"></span>' +
            '<span class="key">' +
            k.key +
            "</span>" +
            '<div class="glow" style="box-shadow:inset 0 0 22px ' +
            col +
            ", 0 0 16px " +
            col +
            "; border:1px solid " +
            col +
            '"></div>' +
            '<div class="lab">' +
            k.label +
            "</div>";
          // Mouse/click for desktop — suppressed when touch fires
          d.addEventListener("click", (e) => {
            if (touchedRecently) {
              e.preventDefault();
              return;
            }
            hit(i, false, inputTimestamp(e));
          });
          grid.appendChild(d);
        });
      }

      // Multi-touch: handle touchstart on the grid (delegated)
      function padIndexFromTouch(touch) {
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (!el) return -1;
        const pad = el.closest(".pad");
        if (!pad || !grid.contains(pad)) return -1;
        return parseInt(pad.dataset.i, 10);
      }

      grid.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault(); // prevent scroll + suppress synthesized click
          touchedRecently = true;
          clearTimeout(grid._touchTimer);
          grid._touchTimer = setTimeout(() => {
            touchedRecently = false;
          }, 400);
          for (const touch of e.changedTouches) {
            const idx = padIndexFromTouch(touch);
            if (idx >= 0 && !activeTouches.has(touch.identifier)) {
              activeTouches.set(touch.identifier, idx);
              hit(idx, false, inputTimestamp(e));
            }
          }
        },
        { passive: false },
      );

      grid.addEventListener("touchend", (e) => {
        for (const touch of e.changedTouches) {
          activeTouches.delete(touch.identifier);
        }
      });

      grid.addEventListener("touchcancel", (e) => {
        for (const touch of e.changedTouches) {
          activeTouches.delete(touch.identifier);
        }
      });

      function flash(i) {
        const el = grid.children[i];
        if (!el) return;
        el.classList.add("hit");
        setTimeout(() => el.classList.remove("hit"), 24);
      }

      function inputTimestamp(event) {
        if (!event || typeof event.timeStamp !== "number")
          return performance.now();
        const now = performance.now();
        const stamp = event.timeStamp;
        if (Math.abs(stamp - now) < 60000) return stamp;
        if (performance.timeOrigin) {
          const relativeStamp = stamp - performance.timeOrigin;
          if (Math.abs(relativeStamp - now) < 60000) return relativeStamp;
        }
        return now;
      }

      function hit(i, fromLoop, inputTime) {
        resumeAudio();
        const now =
          !fromLoop && Number.isFinite(inputTime)
            ? inputTime
            : performance.now();
        const k = kit[i];
        play(k.file, i);
        flash(i);
        if (!fromLoop && runtime.recordLayer) {
          const total = fixedLoopLength();
          let eventTime = null;
          if (runtime.mode === "recording") {
            eventTime = now - runtime.recordStart;
          } else if (runtime.mode === "countin") {
            const scheduledStart =
              runtime.countInStart + COUNT_IN_BEATS * beatMs();
            if (now >= scheduledStart - boundaryGraceMs(total)) {
              eventTime = now - scheduledStart;
            }
          }
          if (eventTime !== null) {
            runtime.recordLayer.events.push([
              i,
              wrapLoopTime(eventTime, total),
            ]);
          }
        }
      }

      const keyMap = {};
      KEYS.forEach((key, i) => {
        keyMap[key.toLowerCase()] = i;
      });

      document.addEventListener("keydown", (e) => {
        if (e.repeat) return;
        const i = keyMap[e.key.toLowerCase()];
        if (i !== undefined) hit(i, false, inputTimestamp(e));
      });

      // ---------- transport ----------
      function clearFrame() {
        if (runtime.rafId) cancelAnimationFrame(runtime.rafId);
        runtime.rafId = 0;
      }

      function stopTransport() {
        clearFrame();
        stopStutter();
        runtime.mode = "idle";
        runtime.lastBeat = -1;
        runtime.lastProgress = 0;
        runtime.playLastFrameTime = 0;
        runtime.recordLayer = null;
        runtime.recordType = "base";
        hideCountdown();
        clearStepReadout();
        updateButtons();
        updateDisplay();
      }

      function startRecordSequence() {
        resumeAudio();
        stopTransport();
        runtime.loadedFromShare = false;
        runtime.loadedStandaloneShare = false;
        runtime.recordType = loop.layers.length ? "overdub" : "base";
        runtime.recordLayer = { events: [] };
        if (!loop.layers.length) {
          resetLoopData();
        } else if (!loop.length) {
          loop.length = fixedLoopLength();
        }
        runtime.mode = "countin";
        runtime.countInStart = performance.now();
        runtime.lastBeat = -1;
        updateButtons();
        updateDisplay();
        runtime.rafId = requestAnimationFrame(runTransportFrame);
      }

      function beginRecording(now) {
        runtime.mode = "recording";
        // Use the exact mathematical start time, not the frame time
        runtime.recordStart = runtime.countInStart + COUNT_IN_BEATS * beatMs();
        runtime.lastBeat = -1;
        runtime.lastProgress = 0;
        hideCountdown();
        updateButtons();
        updateDisplay();
      }

      function finishRecording() {
        loop.length = fixedLoopLength();
        if (runtime.recordLayer && runtime.recordLayer.events.length) {
          loop.layers.push({
            events: quantizeLayer(runtime.recordLayer.events, loop.length),
          });
          syncLoopEvents();
        }
        runtime.recordLayer = null;
        if (loop.events.length) {
          startLoop();
        } else {
          stopTransport();
        }
      }

      function startLoop() {
        if (!loop.events.length) {
          stopTransport();
          lcdMessage.textContent = "RECORD A LOOP FIRST";
          return;
        }
        resumeAudio();
        clearFrame();
        hideCountdown();
        runtime.mode = "playing";
        runtime.playStart = performance.now();
        runtime.lastProgress = 0;
        runtime.playLastFrameTime = runtime.playStart;
        updateButtons();
        updateDisplay();
        runtime.rafId = requestAnimationFrame(runTransportFrame);
      }

      function fireLoopWindow(start, end, targetLength) {
        if (!loop.events.length || targetLength <= 0) return;
        const lower = start === 0 ? -0.0001 : start;
        loop.events.forEach(([i, t]) => {
          const scaled = loop.length > 0 ? (t / loop.length) * targetLength : t;
          if (scaled > lower && scaled <= end) hit(i, true);
        });
      }

      function runCountInFrame(now) {
        const elapsed = now - runtime.countInStart;
        const currentBeat = Math.min(
          COUNT_IN_BEATS - 1,
          Math.floor(elapsed / beatMs()),
        );
        const currentNumber = COUNT_IN_BEATS - currentBeat;

        showCountdown(currentNumber);

        if (currentBeat !== runtime.lastBeat) {
          runtime.lastBeat = currentBeat;
          playClick(currentBeat === 0);
        }

        if (elapsed >= COUNT_IN_BEATS * beatMs()) {
          beginRecording(now);
        }
      }

      function runRecordingFrame(now) {
        const elapsed = now - runtime.recordStart;
        const total = fixedLoopLength();
        const clampedElapsed = Math.min(elapsed, total);
        const currentBeat = Math.floor(clampedElapsed / beatMs());

        if (currentBeat !== runtime.lastBeat && currentBeat < LOOP_BARS * 4) {
          runtime.lastBeat = currentBeat;
          playClick(currentBeat % 4 === 0);
        }

        if (runtime.recordType === "overdub" && loop.events.length) {
          fireLoopWindow(runtime.lastProgress, clampedElapsed, total);
        }

        runtime.lastProgress = clampedElapsed;
        renderStepReadout(clampedElapsed, total);

        if (elapsed >= total + boundaryGraceMs(total)) finishRecording();
      }

      function runPlaybackFrame(now) {
        const targetLength = fixedLoopLength();
        const previous = runtime.lastProgress || 0;
        const lastFrame = runtime.playLastFrameTime || now;
        const delta = Math.max(0, now - lastFrame);
        const rate = runtime.fxPitchRate || 1;
        let pos = previous + delta * rate;
        runtime.playLastFrameTime = now;

        if (runtime.stutterActive) {
          runStutterFrame(now, targetLength);
        } else if (pos >= targetLength) {
          fireLoopWindow(previous, targetLength, targetLength);
          const wraps = Math.floor(pos / targetLength);
          pos = wrapLoopTime(pos, targetLength);
          for (let i = 1; i < wraps; i++) {
            fireLoopWindow(0, targetLength, targetLength);
          }
          fireLoopWindow(0, pos, targetLength);
        } else {
          fireLoopWindow(previous, pos, targetLength);
        }
        if (pos >= targetLength) pos = wrapLoopTime(pos, targetLength);
        runtime.lastProgress = pos;
        renderStepReadout(pos, targetLength);
      }

      function runTransportFrame(now) {
        if (runtime.mode === "countin") {
          runCountInFrame(now);
        } else if (runtime.mode === "recording") {
          runRecordingFrame(now);
        } else if (runtime.mode === "playing") {
          runPlaybackFrame(now);
        }

        if (runtime.mode !== "idle") {
          runtime.rafId = requestAnimationFrame(runTransportFrame);
        }
      }

      // ---------- share ----------
      function packLayer(events) {
        let prev = 0;
        return events
          .map(([i, t], index) => {
            const rounded = Math.round(t);
            const delta = index === 0 ? rounded : rounded - prev;
            prev = rounded;
            return i.toString(36) + delta.toString(36);
          })
          .join(".");
      }

      function unpackLayer(layerStr) {
        if (!layerStr) return [];
        let prev = 0;
        return layerStr
          .split(".")
          .filter(Boolean)
          .map((token, index) => {
            const i = parseInt(token.charAt(0), 36);
            const delta = parseInt(token.slice(1) || "0", 36);
            const t = index === 0 ? delta : prev + delta;
            prev = t;
            return [i, t];
          });
      }

      function encode() {
        const layerStr = loop.layers
          .map((layer) => packLayer(layer.events))
          .filter(Boolean)
          .join("~");
        const head = [
          "f4",
          (seed >>> 0).toString(36),
          bpm.toString(36),
          skinIdx.toString(36),
        ];
        return layerStr ? head.concat(layerStr).join(".") : head.join(".");
      }

      function loadHash() {
        if (location.hash.length < 3) return false;
        try {
          const raw = location.hash.slice(1);
          const parts = raw.split(".");
          if (parts[0] !== "f4") return false;
          seed = parseInt(parts[1], 36) >>> 0;
          bpm = FIXED_BPM;
          skinIdx = Math.max(
            0,
            Math.min(SKINS.length - 1, parseInt(parts[3], 36) || 0),
          );
          const targetLength = fixedLoopLength();
          const layerStr = parts.slice(4).join(".");
          loop.layers = layerStr
            ? layerStr
                .split("~")
                .filter(Boolean)
                .map((layer) => ({
                  events: normalizeLayer(unpackLayer(layer), targetLength),
                }))
            : [];
          syncLoopEvents();
          loop.length = targetLength;
          runtime.loadedFromShare = loop.events.length > 0;
          runtime.loadedStandaloneShare = !embedded && runtime.loadedFromShare;
          return true;
        } catch (e) {
          return false;
        }
      }

      // ---------- demo helpers ----------
      function createDemoLoop() {
        const total = fixedLoopLength();
        const step = total / DISPLAY_STEPS;
        loop.length = total;
        loop.layers = [
          {
            events: normalizeLayer(
              [
                [0, 0],
                [8, step * 1],
                [2, step * 2],
                [1, step * 4],
                [10, step * 5],
                [2, step * 6],
                [0, step * 8],
                [8, step * 9],
                [2, step * 10],
                [1, step * 12],
                [10, step * 13],
                [2, step * 14],
              ],
              total,
            ),
          },
        ];
        syncLoopEvents();
        runtime.loadedFromShare = false;
      }

      // ---------- events ----------
      metroBtn.addEventListener("click", () => {
        metronomeOn = !metronomeOn;
        updateDisplay();
      });

      quantBtn.addEventListener("click", () => {
        quantizeOn = !quantizeOn;
        updateDisplay();
      });

      playBtn.addEventListener("click", () => {
        if (runtime.mode === "playing") {
          stopTransport();
        } else if (runtime.mode === "countin" || runtime.mode === "recording") {
          stopTransport();
        } else {
          startLoop();
        }
      });

      recBtn.addEventListener("click", () => {
        if (runtime.mode === "countin" || runtime.mode === "recording") {
          stopTransport();
        } else {
          startRecordSequence();
        }
      });

      clearBtn.addEventListener("click", () => {
        stopTransport();
        resetLoopData();
        runtime.loadedFromShare = false;
        runtime.loadedStandaloneShare = false;
        updateButtons();
        updateDisplay();
      });

      undoBtn.addEventListener("click", () => {
        if (
          !loop.layers.length ||
          runtime.mode === "countin" ||
          runtime.mode === "recording"
        )
          return;
        stopTransport();
        loop.layers.pop();
        syncLoopEvents();
        if (!loop.events.length) loop.length = fixedLoopLength();
        runtime.loadedFromShare = false;
        runtime.loadedStandaloneShare = false;
        updateButtons();
        updateDisplay();
      });

      shareBtn.addEventListener("click", () => {
        const encodedLoop = encode();
        const url = standaloneShareUrl(encodedLoop);
        shareCurrentLink(url);
        location.hash = encodedLoop;
      });

      shuffleBtn.addEventListener("click", () => {
        stopTransport();
        buildKit((Math.random() * 4294967296) >>> 0);
        renderPads();
        loadKit();
      });

      skinBtn.addEventListener("click", () => {
        skinIdx = (skinIdx + 1) % SKINS.length;
        applySkin();
      });

      infoBtn.addEventListener("click", () => {
        setInfoOpen(infoBtn.getAttribute("aria-expanded") !== "true");
      });

      infoBtn.addEventListener("blur", () => {
        window.setTimeout(() => {
          if (!infoWrap.contains(document.activeElement)) setInfoOpen(false);
        }, 0);
      });

      document.addEventListener("click", (event) => {
        if (!infoWrap.contains(event.target)) setInfoOpen(false);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          setInfoOpen(false);
          toastEl.classList.remove("is-visible");
          window.clearTimeout(shareTimer);
          resetShareFeedback();
        }
      });

      // ---------- init ----------
      const params = new URLSearchParams(location.search);
      const embedded =
        window.self !== window.top || params.get("embed") === "1";
      rootEl.classList.toggle("is-embedded", embedded);
      const preset = params.get("preset");
      let demoMode = params.get("demo");
      if (preset) {
        const [presetDemo] = preset.split("-");
        if (!demoMode && presetDemo && presetDemo !== "base")
          demoMode = presetDemo;
      }
      if (params.get("metro") === "off") metronomeOn = false;
      if (params.get("quant") === "off") quantizeOn = false;

      const frameObserver = new ResizeObserver(() => syncDeviceFrame());
      [wrapEl].forEach((el) => {
        if (el) frameObserver.observe(el);
      });
      window.addEventListener("resize", syncDeviceFrame);

      if (loadHash()) {
        buildKit(seed);
      } else {
        buildKit((Math.random() * 4294967296) >>> 0);
        loop.length = fixedLoopLength();
      }

      applySkin();
      updateAxisLabels();
      updateXyCursor(0.5, 0.5, false);
      setViewMode("pads");
      renderPads();
      loadKit();
      updateButtons();
      updateDisplay();
      syncDeviceFrame();

      if (demoMode === "countin") {
        setTimeout(() => startRecordSequence(), 180);
      } else if (demoMode === "loopready") {
        if (!loop.events.length) createDemoLoop();
        stopTransport();
      } else if (demoMode === "overdub") {
        if (!loop.events.length) createDemoLoop();
        setTimeout(() => startRecordSequence(), 180);
      } else if (demoMode === "play") {
        if (!loop.events.length) createDemoLoop();
        setTimeout(() => startLoop(), 180);
      } else if (demoMode === "shared") {
        if (!loop.events.length) {
          createDemoLoop();
          runtime.loadedFromShare = true;
          updateDisplay();
        }
      }
    </script>
  </body>
</html>
