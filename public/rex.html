<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FONOSAUR — Rex</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0908;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: "Unbounded", sans-serif;
        color: #e8e0d4;
        overflow: hidden;
      }
      @media (max-width: 600px) and (orientation: portrait) {
        body {
          justify-content: flex-start;
          padding-top: clamp(76px, 14svh, 118px);
        }
      }
      canvas {
        display: block;
        border-radius: 8px;
        cursor: crosshair;
        image-rendering: auto;
      }
      .ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        z-index: 10;
      }
      .score {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .p1-score {
        color: #00cc50;
      }
      .p2-score {
        color: rgba(232, 224, 212, 0.3);
        font-size: 9px;
      }
      .turn-info {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(232, 224, 212, 0.5);
        pointer-events: none;
        z-index: 10;
        transition: opacity 0.3s;
      }
      .controls {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "JetBrains Mono", monospace;
        font-size: 8px;
        letter-spacing: 2px;
        color: rgba(232, 224, 212, 0.2);
        pointer-events: none;
        z-index: 10;
        text-align: center;
        line-height: 1.8;
      }
      .title-screen {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 20;
        background: rgba(10, 9, 8, 0.9);
        backdrop-filter: blur(4px);
        transition: opacity 0.5s;
      }
      .title-screen.hide {
        opacity: 0;
        pointer-events: none;
      }
      .title-screen h1 {
        font-weight: 200;
        font-size: clamp(28px, 6vw, 52px);
        letter-spacing: -1px;
        margin-bottom: 6px;
      }
      .title-screen h1 b {
        font-weight: 700;
        color: #00cc50;
      }
      .title-screen p {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        letter-spacing: 3px;
        color: rgba(232, 224, 212, 0.3);
        margin-bottom: 30px;
      }
      .title-screen .hi {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        letter-spacing: 2px;
        color: rgba(232, 224, 212, 0.2);
        margin-bottom: 18px;
      }
      .start-btn {
        font-family: "Unbounded", sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #e8e0d4;
        background: none;
        border: 1px solid rgba(0, 204, 80, 0.2);
        padding: 14px 36px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s;
      }
      .start-btn:hover {
        border-color: rgba(0, 204, 80, 0.5);
        background: rgba(0, 204, 80, 0.05);
        color: #00cc50;
      }
      .start-btn:focus-visible {
        outline: 2px solid #00cc50;
        outline-offset: 3px;
        border-color: rgba(0, 204, 80, 0.55);
        background: rgba(0, 204, 80, 0.08);
      }
      .game-over {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 20;
        background: rgba(10, 9, 8, 0.85);
        backdrop-filter: blur(4px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
      }
      .game-over.show {
        opacity: 1;
        pointer-events: all;
      }
      .game-over h2 {
        font-weight: 300;
        font-size: clamp(20px, 4vw, 36px);
        margin-bottom: 6px;
        color: #ff6b5c;
      }
      .game-over .final-score {
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        letter-spacing: 3px;
        margin-bottom: 6px;
        color: #e8e0d4;
      }
      .game-over .high-score {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        letter-spacing: 2px;
        opacity: 0.35;
        margin-bottom: 28px;
      }
      .game-over .new-best {
        color: #00cc50;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="ui">
      <span class="score p1-score" id="levelUI">LEVEL 1</span>
      <span class="score p2-score" id="hiUI"></span>
    </div>
    <span class="turn-info" id="turnInfo"></span>
    <div class="controls" id="controls">
      Click &amp; drag from your dino to aim · release to throw · arrow keys
      adjust angle/power
    </div>

    <canvas id="c"></canvas>

    <div class="title-screen" id="titleScreen">
      <h1>REX</h1>
      <p class="hi" id="titleHi"></p>
      <button class="start-btn" id="startBtn" aria-label="Play Rex">
        Play Rex
      </button>
    </div>

    <div class="game-over" id="gameOver">
      <h2>GAME OVER</h2>
      <p class="final-score" id="goScore"></p>
      <p class="high-score" id="goHigh"></p>
      <button class="start-btn" id="restartBtn">Play Again</button>
    </div>

    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      // Sizing
      let W, H;
      function resize() {
        const isMobilePortrait =
          window.innerWidth <= 600 && window.innerHeight > window.innerWidth;
        const horizontalGutter = isMobilePortrait ? 4 : 20;
        const verticalGutter = isMobilePortrait ? 140 : 20;
        const maxW = Math.min(window.innerWidth - horizontalGutter, 900);
        const maxH = Math.min(window.innerHeight - verticalGutter, 560);
        const aspect = 16 / 10;
        if (maxW / maxH > aspect) {
          W = Math.floor(maxH * aspect);
          H = Math.floor(maxH);
        } else {
          W = Math.floor(maxW);
          H = Math.floor(maxW / aspect);
        }
        W = Math.max(W, 320);
        H = Math.max(H, 200);
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
      }
      resize();
      window.addEventListener("resize", () => {
        resize();
        if (state === "idle") generateCity();
      });

      // ===== PERSISTENT HIGH SCORE =====
      let highScore = 0;
      function loadHighScore() {
        try {
          const v = localStorage.getItem("rex_hi");
          if (v) highScore = parseInt(v, 10) || 0;
        } catch (e) {}
      }
      function saveHighScore() {
        try {
          localStorage.setItem("rex_hi", String(highScore));
        } catch (e) {}
      }
      loadHighScore();

      // ===== GAME STATE =====
      const GRAVITY = 0.15;
      let state = "title"; // title, aiming, flying, exploding, gameover
      let turn = 0; // 0=player, 1=cpu
      let level = 1;
      let buildings = [];
      let dinos = [
        { x: 0, y: 0, bIdx: -1 },
        { x: 0, y: 0, bIdx: -1 },
      ];
      let cpuShotCount = 0; // shots CPU has taken this round (for zero-in)
      let cpuLastMiss = { dx: 0, dy: 0 }; // where its last shot landed relative to target
      let projectile = null;
      let explosions = [];
      let particles = [];
      let fireTrail = [];
      let aimAngle = 45;
      let aimPower = 60;
      let dragging = false;
      let dragStart = { x: 0, y: 0 };
      const DINO_SPRITES = [
        {
          src: "/rex/rex-green.png",
          sx: 10,
          sy: 192,
          sw: 608,
          sh: 638,
          mouthX: 0.91,
          mouthY: 0.31,
          headX: 0.67,
          bodyX: 0.46,
        },
        {
          src: "/rex/rex-blue.png",
          sx: 16,
          sy: 188,
          sw: 604,
          sh: 644,
          mouthX: 0.09,
          mouthY: 0.31,
          headX: 0.33,
          bodyX: 0.54,
        },
      ];
      const dinoImages = DINO_SPRITES.map((sprite) => {
        const img = new Image();
        img.decoding = "async";
        img.src = sprite.src;
        img.onload = () => draw();
        return img;
      });
      const planetImage = new Image();
      planetImage.decoding = "async";
      planetImage.src = "/rex/planet-purple.png";
      planetImage.onload = () => draw();

      // Planet / stars
      let moonX, moonY, moonR;
      let stars = [];
      let shootingStars = [];
      let nextShootingStarAt = 0;

      // ===== SKY PALETTES (cycle per level) =====
      const SKY_PALETTES = [
        ["#0a0a1a", "#111428", "#1a1535", "#2d1a2e", "#3d1f28", "#1a1210"],
        ["#060d1f", "#0d1a38", "#162b4a", "#1a3050", "#1e3548", "#101820"],
        ["#100a1e", "#1a1040", "#2a1555", "#3a1a4a", "#2d1535", "#150e18"],
        ["#0f0a06", "#1a1208", "#2a1a08", "#3d2510", "#4a2a10", "#1a1008"],
        ["#060f10", "#0a1a1e", "#0e2828", "#103530", "#0e2a24", "#0a1410"],
        ["#100808", "#1a0e10", "#2a1418", "#3d1a1e", "#4a2020", "#1a0e0a"],
        ["#060e08", "#0a1a0e", "#0e2814", "#10301a", "#0e2a18", "#08140a"],
        ["#0e0a06", "#1a1408", "#28200c", "#3a2c10", "#2a2008", "#141006"],
      ];

      function skyForLevel(lvl) {
        return SKY_PALETTES[(lvl - 1) % SKY_PALETTES.length];
      }

      // ===== SKY & ENVIRONMENT =====
      function generateStars() {
        stars = [];
        for (let i = 0; i < 80; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H * 0.5,
            r: Math.random() * 1.2 + 0.3,
            b: Math.random() * 0.4 + 0.3,
            twinkle: Math.random() * Math.PI * 2,
          });
        }
        moonX = W * (0.3 + Math.random() * 0.4);
        moonY = H * (0.08 + Math.random() * 0.12);
        moonR = clamp(W * (0.052 + Math.random() * 0.012), 18, 24);
        shootingStars = [];
        nextShootingStarAt = performance.now() + 1800 + Math.random() * 4200;
      }

      function spawnShootingStar(now) {
        const leftToRight = Math.random() > 0.35;
        const y = H * (0.08 + Math.random() * 0.28);
        const duration = 42 + Math.random() * 20;
        shootingStars.push({
          x: leftToRight ? -20 : W + 20,
          y,
          vx: (leftToRight ? 1 : -1) * (2.2 + Math.random() * 1.5),
          vy: 0.42 + Math.random() * 0.42,
          life: duration,
          maxLife: duration,
          len: 14 + Math.random() * 14,
        });
        nextShootingStarAt = now + 3800 + Math.random() * 7600;
      }

      function updateShootingStars(now) {
        if (now >= nextShootingStarAt && shootingStars.length < 2) {
          spawnShootingStar(now);
        }
        shootingStars = shootingStars.filter((star) => {
          star.x += star.vx;
          star.y += star.vy;
          star.life--;
          return (
            star.life > 0 &&
            star.x > -80 &&
            star.x < W + 80 &&
            star.y < H * 0.58
          );
        });
      }

      function drawSky() {
        const pal = skyForLevel(level);
        const g = ctx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, pal[0]);
        g.addColorStop(0.2, pal[1]);
        g.addColorStop(0.4, pal[2]);
        g.addColorStop(0.6, pal[3]);
        g.addColorStop(0.8, pal[4]);
        g.addColorStop(1, pal[5]);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);

        const t = Date.now() / 1000;
        stars.forEach((s) => {
          const twinkle = 0.5 + Math.sin(t * 1.5 + s.twinkle) * 0.5;
          ctx.globalAlpha = s.b * twinkle;
          ctx.fillStyle = "#e8e0d4";
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        shootingStars.forEach((star) => {
          const alpha = Math.max(0, star.life / star.maxLife) * 0.46;
          const ang = Math.atan2(star.vy, star.vx);
          const tailX = Math.cos(ang) * star.len;
          const tailY = Math.sin(ang) * star.len;
          const sg = ctx.createLinearGradient(
            star.x,
            star.y,
            star.x - tailX,
            star.y - tailY,
          );
          sg.addColorStop(0, "rgba(255,246,214," + alpha + ")");
          sg.addColorStop(1, "rgba(255,246,214,0)");
          ctx.strokeStyle = sg;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(star.x, star.y);
          ctx.lineTo(star.x - tailX, star.y - tailY);
          ctx.stroke();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = "#fff6d6";
          ctx.beginPath();
          ctx.arc(star.x, star.y, 1.1, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        });

        // Illustrated planet
        ctx.save();
        ctx.translate(moonX, moonY);
        const planetSize = moonR * 3.85;
        const plg = ctx.createRadialGradient(
          0,
          0,
          moonR,
          0,
          0,
          planetSize * 0.72,
        );
        plg.addColorStop(0, "rgba(150,70,190,.16)");
        plg.addColorStop(0.58, "rgba(150,70,190,.045)");
        plg.addColorStop(1, "transparent");
        ctx.globalAlpha = 1;
        ctx.fillStyle = plg;
        ctx.beginPath();
        ctx.arc(0, 0, planetSize * 0.72, 0, Math.PI * 2);
        ctx.fill();
        if (planetImage.complete && planetImage.naturalWidth) {
          ctx.globalAlpha = 0.72;
          ctx.drawImage(
            planetImage,
            -planetSize / 2,
            -planetSize / 2,
            planetSize,
            planetSize,
          );
        } else {
          ctx.globalAlpha = 0.28;
          ctx.fillStyle = "#7a2aa8";
          ctx.beginPath();
          ctx.arc(0, 0, moonR, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // ===== CITY (difficulty-scaled) =====
      function seededRandom(seed) {
        var s = seed >>> 0;
        return function () {
          s = (s * 1664525 + 1013904223) >>> 0;
          return s / 4294967296;
        };
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function generateCity() {
        buildings = [];
        var rand = seededRandom(
          level * 4099 + Math.round(W) * 17 + Math.round(H),
        );
        var extraH = Math.min((level - 1) * 0.018, 0.2);
        var minW = W * Math.max(0.034, 0.046 - level * 0.0008);
        var maxW = W * Math.max(0.052, 0.074 - level * 0.0014);
        var x = 0;
        var index = 0;
        while (x < W) {
          var bw = Math.max(minW, minW + rand() * (maxW - minW));
          var wave = (Math.sin(index * 1.6 + level * 0.72) + 1) / 2;
          var baseH = H * (0.22 + extraH);
          var variation = H * (0.13 + Math.min(level * 0.006, 0.08));
          var bh = baseH + wave * variation + rand() * H * 0.08;
          buildings.push({
            x: x,
            w: bw,
            h: clamp(bh, H * 0.22, H * 0.68),
            color:
              "hsl(" +
              (220 + rand() * 30) +
              "," +
              (8 + rand() * 12) +
              "%," +
              (8 + rand() * 10) +
              "%)",
            windows: rand() > 0.3,
          });
          x += bw + 1;
          index++;
        }
        if (buildings.length < 4) {
          buildings.push({
            x: 0,
            w: Math.max(W, 40),
            h: H * 0.2,
            color: "#111",
            windows: false,
          });
        }
        var n = buildings.length;
        var playerTargetX = W * (0.12 + rand() * 0.16);
        var idx1 = 0;
        var bestPlayerDx = Infinity;
        for (var pi = 0; pi < n - 2; pi++) {
          var pc = buildings[pi].x + buildings[pi].w / 2;
          var playerDx = Math.abs(pc - playerTargetX);
          if (pc > W * 0.08 && pc < W * 0.34 && playerDx < bestPlayerDx) {
            bestPlayerDx = playerDx;
            idx1 = pi;
          }
        }
        var b1 = buildings[idx1] || buildings[0];
        var playerX = b1.x + b1.w / 2;
        var minDistance = W * 0.38;
        var maxDistance = W * 0.68;
        var distanceRatio = 0.4 + rand() * 0.26;
        var targetX = clamp(
          playerX + W * distanceRatio,
          playerX + minDistance,
          Math.min(W * 0.92, playerX + maxDistance),
        );
        var idx2 = n - 1;
        var bestDx = Infinity;
        for (var bi = idx1 + 1; bi < n - 1; bi++) {
          var center = buildings[bi].x + buildings[bi].w / 2;
          var gap = center - playerX;
          if (gap < minDistance || gap > maxDistance || center > W * 0.94) {
            continue;
          }
          var dx = Math.abs(center - targetX);
          if (dx < bestDx) {
            bestDx = dx;
            idx2 = bi;
          }
        }
        if (bestDx === Infinity) {
          var bestPenalty = Infinity;
          for (var fi = idx1 + 1; fi < n - 1; fi++) {
            var fallbackCenter = buildings[fi].x + buildings[fi].w / 2;
            var fallbackGap = fallbackCenter - playerX;
            var distancePenalty =
              fallbackGap < minDistance
                ? minDistance - fallbackGap
                : fallbackGap > maxDistance
                  ? fallbackGap - maxDistance
                  : 0;
            var edgePenalty = fallbackCenter > W * 0.94 ? W : 0;
            var targetPenalty = Math.abs(fallbackCenter - targetX);
            var penalty = distancePenalty * 3 + edgePenalty + targetPenalty;
            if (penalty < bestPenalty) {
              bestPenalty = penalty;
              idx2 = fi;
            }
          }
        }
        idx2 = clamp(idx2, idx1 + 1, n - 2);
        var b2 = buildings[idx2] || buildings[n - 1];
        var dinoHeight = H * clamp(0.3 + (level - 1) * 0.012, 0.3, 0.52);
        var heightSwing = (rand() - 0.5) * H * 0.22;
        b1.h = clamp(dinoHeight + heightSwing + H * 0.018, H * 0.24, H * 0.64);
        b2.h = clamp(
          dinoHeight - heightSwing * 0.78 - H * 0.01,
          H * 0.24,
          H * 0.64,
        );
        dinos[0] = { x: b1.x + b1.w / 2, y: H - b1.h, bIdx: idx1 };
        dinos[1] = { x: b2.x + b2.w / 2, y: H - b2.h, bIdx: idx2 };
        cpuShotCount = 0;
        cpuLastMiss = { dx: 0, dy: 0 };
        generateStars();
      }

      // After building damage, reseat any dino whose building got shorter
      function reseatDinos() {
        for (var i = 0; i < 2; i++) {
          var d = dinos[i];
          if (d.bIdx < 0 || d.bIdx >= buildings.length) continue;
          var b = buildings[d.bIdx];
          var rooftop = H - b.h;
          if (d.y < rooftop) {
            d.y = rooftop; // drop to new rooftop
          }
        }
      }

      function drawBuildings() {
        buildings.forEach((b) => {
          const by = H - b.h;
          ctx.fillStyle = b.color;
          ctx.fillRect(b.x, by, b.w, b.h);
          if (b.windows) {
            const cols = Math.floor(b.w / 10);
            const rows = Math.floor(b.h / 14);
            for (let r = 0; r < rows; r++) {
              for (let c = 0; c < cols; c++) {
                if (Math.random() > 0.4) {
                  const wx = b.x + 4 + c * (b.w / cols);
                  const wy = by + 6 + r * 14;
                  ctx.fillStyle =
                    Math.random() > 0.6
                      ? "rgba(200,170,80,.15)"
                      : "rgba(100,120,160,.06)";
                  ctx.fillRect(wx, wy, 4, 6);
                }
              }
            }
          }
        });
      }

      // ===== DINOSAURS =====
      function dinoTargetHeight() {
        return clamp(H * 0.093, 36, 53);
      }

      function dinoSpriteRect(index) {
        const d = dinos[index];
        const sprite = DINO_SPRITES[index];
        const h = dinoTargetHeight();
        const w = h * (sprite.sw / sprite.sh);
        const footOverlap = h * 0.08;
        return {
          x: d.x - w / 2,
          y: d.y - h + footOverlap,
          w,
          h,
        };
      }

      function dinoMouth(index) {
        const rect = dinoSpriteRect(index);
        const sprite = DINO_SPRITES[index];
        return {
          x: rect.x + rect.w * sprite.mouthX,
          y: rect.y + rect.h * sprite.mouthY,
        };
      }

      function dinoAimTarget(index) {
        const rect = dinoSpriteRect(index);
        const sprite = DINO_SPRITES[index];
        return {
          x: rect.x + rect.w * sprite.headX,
          y: rect.y + rect.h * 0.4,
        };
      }

      function pointInEllipse(px, py, cx, cy, rx, ry) {
        const dx = (px - cx) / rx;
        const dy = (py - cy) / ry;
        return dx * dx + dy * dy <= 1;
      }

      function drawDinoSprite(index, isActive) {
        const img = dinoImages[index];
        const sprite = DINO_SPRITES[index];
        const rect = dinoSpriteRect(index);
        ctx.save();
        ctx.shadowColor =
          index === 0 ? "rgba(0,204,80,0.18)" : "rgba(59,139,255,0.16)";
        ctx.shadowBlur = isActive ? 12 : 5;
        if (img && img.complete && img.naturalWidth) {
          ctx.drawImage(
            img,
            sprite.sx,
            sprite.sy,
            sprite.sw,
            sprite.sh,
            rect.x,
            rect.y,
            rect.w,
            rect.h,
          );
        } else {
          ctx.fillStyle = index === 0 ? "#00cc50" : "#3b8bff";
          ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
        }
        ctx.restore();

        if (isActive) {
          const target = dinoAimTarget(index);
          ctx.save();
          ctx.strokeStyle = index === 0 ? "#00cc50" : "#3b8bff";
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.28 + Math.sin(Date.now() / 300) * 0.16;
          ctx.setLineDash([3, 4]);
          ctx.beginPath();
          ctx.arc(
            target.x,
            target.y,
            dinoTargetHeight() * 0.62,
            0,
            Math.PI * 2,
          );
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawDino(x, y, facing, color1, color2, isActive) {
        ctx.save();
        ctx.translate(x, y);
        if (facing < 0) ctx.scale(-1, 1);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        const s = 0.65;
        ctx.scale(s, s);
        ctx.strokeStyle = "#0a0908";
        ctx.lineWidth = 2.5;

        ctx.fillStyle = color1;
        ctx.beginPath();
        ctx.moveTo(-5, -28);
        ctx.lineTo(-6, -6);
        ctx.lineTo(6, -6);
        ctx.lineTo(7, -28);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-8, -28);
        ctx.lineTo(-9, -40);
        ctx.lineTo(16, -42);
        ctx.lineTo(17, -28);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-8, -26);
        ctx.lineTo(-8, -21);
        ctx.lineTo(17, -21);
        ctx.lineTo(17, -26);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#e8e0d4";
        ctx.strokeStyle = "#0a0908";
        ctx.lineWidth = 1.2;
        [-5, 0, 5, 10].forEach((tx) => {
          ctx.beginPath();
          ctx.moveTo(tx, -26);
          ctx.lineTo(tx + 2, -26 + 2.5);
          ctx.lineTo(tx + 4, -26);
          ctx.fill();
          ctx.stroke();
        });
        [-4, 1, 6, 11].forEach((tx) => {
          ctx.beginPath();
          ctx.moveTo(tx, -21);
          ctx.lineTo(tx + 1.8, -21 - 2);
          ctx.lineTo(tx + 3.5, -21);
          ctx.fill();
          ctx.stroke();
        });

        ctx.strokeStyle = "#0a0908";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(6, -36, 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "#e8e0d4";
        ctx.beginPath();
        ctx.arc(6, -36, 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#0a0908";
        ctx.beginPath();
        ctx.arc(7, -36, 1, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#0a0908";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(7, -18);
        ctx.lineTo(12, -14);
        ctx.lineTo(10, -12);
        ctx.stroke();

        ctx.fillStyle = color1;
        ctx.strokeStyle = "#0a0908";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-5, -6);
        ctx.lineTo(-6, 8);
        ctx.lineTo(-2, 8);
        ctx.lineTo(-1, -6);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(2, -6);
        ctx.lineTo(1, 8);
        ctx.lineTo(5, 8);
        ctx.lineTo(6, -6);
        ctx.fill();
        ctx.stroke();
        ctx.fillRect(-8, 7, 8, 3);
        ctx.strokeRect(-8, 7, 8, 3);
        ctx.fillRect(-1, 7, 8, 3);
        ctx.strokeRect(-1, 7, 8, 3);

        ctx.beginPath();
        ctx.moveTo(-5, -24);
        ctx.lineTo(-18, -18);
        ctx.lineTo(-5, -12);
        ctx.fill();
        ctx.stroke();

        if (isActive) {
          ctx.strokeStyle = color2;
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 300) * 0.2;
          ctx.setLineDash([3, 4]);
          ctx.beginPath();
          ctx.arc(2, -18, 30, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;
        }

        ctx.restore();
      }

      // ===== PROJECTILE =====
      function drawProjectile() {
        if (!projectile) return;
        const p = projectile;

        fireTrail.forEach((ft) => {
          const age = 1 - ft.life / ft.maxLife;
          const r = 3 * (1 - age);
          ctx.globalAlpha = (ft.life / ft.maxLife) * 0.6;
          ctx.fillStyle =
            "hsl(" + (30 - age * 30) + ",90%," + (55 - age * 40) + "%)";
          ctx.beginPath();
          ctx.arc(ft.x, ft.y, r + Math.random(), 0, Math.PI * 2);
          ctx.fill();
          if (Math.random() > 0.7) {
            ctx.fillStyle = "rgba(255,200,60,.4)";
            ctx.beginPath();
            ctx.arc(
              ft.x + Math.random() * 6 - 3,
              ft.y + Math.random() * 6 - 3,
              1,
              0,
              Math.PI * 2,
            );
            ctx.fill();
          }
        });
        ctx.globalAlpha = 1;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.spin);
        ctx.fillStyle = "#1a1a1a";
        ctx.beginPath();
        ctx.arc(0, 0, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(0, 0, 7, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,255,255,.06)";
        ctx.beginPath();
        ctx.arc(0, 0, 5.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = turn === 0 ? "#00cc50" : "#3b8bff";
        ctx.beginPath();
        ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#0a0908";
        ctx.beginPath();
        ctx.arc(0, 0, 0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // ===== EXPLOSIONS =====
      function drawExplosions() {
        explosions.forEach((e) => {
          const age = 1 - e.life / e.maxLife;
          const r = e.r * (1 + age * 2);
          ctx.strokeStyle = "rgba(232,224,212," + 0.4 * (1 - age) + ")";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
          ctx.stroke();
          const ig = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r * 0.6);
          ig.addColorStop(0, "rgba(255,180,60," + 0.3 * (1 - age) + ")");
          ig.addColorStop(1, "transparent");
          ctx.fillStyle = ig;
          ctx.beginPath();
          ctx.arc(e.x, e.y, r * 0.6, 0, Math.PI * 2);
          ctx.fill();
        });

        particles.forEach((p) => {
          ctx.globalAlpha = p.life / p.maxLife;
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x - p.s / 2, p.y - p.s / 2, p.s, p.s);
        });
        ctx.globalAlpha = 1;
      }

      // ===== AIM LINE =====
      function drawAimLine() {
        if (state !== "aiming") return;
        const d = dinos[turn];
        const origin = dinoMouth(turn);
        const ang =
          turn === 0
            ? (-aimAngle * Math.PI) / 180
            : (-(180 - aimAngle) * Math.PI) / 180;
        const pow = aimPower * 1.2;

        ctx.strokeStyle = "rgba(232,224,212,.15)";
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(origin.x, origin.y);

        for (let t = 0; t < 40; t++) {
          const px = origin.x + Math.cos(ang) * pow * 0.1 * t;
          const py =
            origin.y + Math.sin(ang) * pow * 0.1 * t + 0.5 * GRAVITY * t * t;
          if (py > H || px < 0 || px > W) break;
          ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = "rgba(232,224,212,.25)";
        ctx.font = '9px "JetBrains Mono"';
        ctx.textAlign = turn === 0 ? "left" : "right";
        ctx.fillText(
          Math.round(aimAngle) + "\u00b0 / " + Math.round(aimPower) + "%",
          origin.x + (turn === 0 ? 14 : -14),
          origin.y - 18,
        );
      }

      // ===== DAMAGE =====
      function applyDamage(x, y, r) {
        buildings.forEach((b) => {
          const by = H - b.h;
          const cx = Math.max(b.x, Math.min(x, b.x + b.w));
          const cy = Math.max(by, Math.min(y, H));
          const dist = Math.hypot(cx - x, cy - y);
          if (dist < r) {
            const overlap = r - dist;
            b.h = Math.max(10, b.h - overlap * 1.5);
          }
        });
        reseatDinos();
      }

      function checkHit(x, y) {
        const target = 1 - turn;
        const rect = dinoSpriteRect(target);
        const sprite = DINO_SPRITES[target];
        const headHit = pointInEllipse(
          x,
          y,
          rect.x + rect.w * sprite.headX,
          rect.y + rect.h * 0.34,
          rect.w * 0.31,
          rect.h * 0.25,
        );
        const bodyHit = pointInEllipse(
          x,
          y,
          rect.x + rect.w * sprite.bodyX,
          rect.y + rect.h * 0.62,
          rect.w * 0.27,
          rect.h * 0.34,
        );
        return headHit || bodyHit;
      }

      function checkBuildingCollision(x, y) {
        for (const b of buildings) {
          const by = H - b.h;
          if (x >= b.x && x <= b.x + b.w && y >= by && y <= H) return true;
        }
        return false;
      }

      // ===== LAUNCH =====
      function launch() {
        const origin = dinoMouth(turn);
        const ang =
          turn === 0
            ? (-aimAngle * Math.PI) / 180
            : (-(180 - aimAngle) * Math.PI) / 180;
        const pow = aimPower * 1.2;
        projectile = {
          x: origin.x,
          y: origin.y,
          vx: Math.cos(ang) * pow * 0.1,
          vy: Math.sin(ang) * pow * 0.1,
          spin: 0,
        };
        fireTrail = [];
        state = "flying";
      }

      function explode(x, y, big) {
        const r = big ? 30 : 18;
        explosions.push({ x, y, r, life: 30, maxLife: 30 });
        applyDamage(x, y, r);
        for (let i = 0; i < (big ? 25 : 12); i++) {
          const ang = Math.random() * Math.PI * 2;
          const spd = 1 + Math.random() * 3;
          particles.push({
            x,
            y,
            vx: Math.cos(ang) * spd,
            vy: Math.sin(ang) * spd - 2,
            s: 1 + Math.random() * 3,
            color: big
              ? "hsl(" +
                (30 + Math.random() * 20) +
                ",80%," +
                (50 + Math.random() * 20) +
                "%)"
              : "rgba(232,224,212,.4)",
            life: 20 + Math.random() * 20,
            maxLife: 40,
          });
        }
      }

      // ===== UPDATE =====
      function update() {
        updateShootingStars(performance.now());
        if (state === "flying" && projectile) {
          const p = projectile;
          p.vy += GRAVITY;
          p.x += p.vx;
          p.y += p.vy;
          p.spin += 0.15;

          fireTrail.push({
            x: p.x - p.vx * 0.5 + Math.random() * 2 - 1,
            y: p.y - p.vy * 0.5 + Math.random() * 2 - 1,
            life: 15,
            maxLife: 15,
          });
          fireTrail = fireTrail.filter((ft) => {
            ft.life--;
            return ft.life > 0;
          });

          if (checkHit(p.x, p.y)) {
            explode(p.x, p.y, true);
            projectile = null;
            state = "exploding";

            if (turn === 0) {
              // Player hit CPU → next level
              setTimeout(() => {
                level++;
                updateLevelUI();
                turn = 0;
                aimAngle = 45;
                aimPower = 60;
                projectile = null;
                explosions = [];
                particles = [];
                fireTrail = [];
                generateCity();
                state = "aiming";
                updateTurnUI();
              }, 1200);
            } else {
              // CPU hit player → game over
              setTimeout(() => {
                showGameOver();
              }, 1200);
            }
            return;
          }

          if (checkBuildingCollision(p.x, p.y)) {
            explode(p.x, p.y, false);
            projectile = null;
            state = "exploding";
            setTimeout(() => {
              turn = 1 - turn;
              state = "aiming";
              updateTurnUI();
              maybeAI();
            }, 800);
            return;
          }

          if (p.y > H + 20 || p.x < -50 || p.x > W + 50) {
            projectile = null;
            fireTrail = [];
            turn = 1 - turn;
            state = "aiming";
            updateTurnUI();
            maybeAI();
          }
        }

        explosions = explosions.filter((e) => {
          e.life--;
          return e.life > 0;
        });
        particles = particles.filter((p) => {
          p.life--;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          return p.life > 0;
        });
      }

      // ===== DRAW =====
      function draw() {
        ctx.clearRect(0, 0, W, H);
        drawSky();
        drawBuildings();
        drawDinoSprite(0, turn === 0 && state === "aiming");
        drawDinoSprite(1, turn === 1 && state === "aiming");
        drawAimLine();
        drawProjectile();
        drawExplosions();
      }

      function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
      }

      // ===== INPUT =====
      canvas.addEventListener("mousedown", (e) => {
        if (state !== "aiming" || turn !== 0) return;
        const rect = canvas.getBoundingClientRect();
        dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        dragging = true;
      });

      canvas.addEventListener("mousemove", (e) => {
        if (!dragging || state !== "aiming" || turn !== 0) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const origin = dinoMouth(turn);
        const dx = mx - origin.x;
        const dy = my - origin.y;
        let ang = (Math.atan2(-dy, turn === 0 ? dx : -dx) * 180) / Math.PI;
        aimAngle = Math.max(5, Math.min(85, ang));
        aimPower = Math.min(100, Math.hypot(dx, dy) / 2);
      });

      canvas.addEventListener("mouseup", () => {
        if (dragging && state === "aiming") {
          launch();
        }
        dragging = false;
      });

      canvas.addEventListener(
        "touchstart",
        (e) => {
          if (state !== "aiming" || turn !== 0) return;
          const rect = canvas.getBoundingClientRect();
          const t = e.touches[0];
          dragStart = { x: t.clientX - rect.left, y: t.clientY - rect.top };
          dragging = true;
          e.preventDefault();
        },
        { passive: false },
      );

      canvas.addEventListener(
        "touchmove",
        (e) => {
          if (!dragging || state !== "aiming" || turn !== 0) return;
          const rect = canvas.getBoundingClientRect();
          const t = e.touches[0];
          const mx = t.clientX - rect.left;
          const my = t.clientY - rect.top;
          const origin = dinoMouth(turn);
          const dx = mx - origin.x;
          const dy = my - origin.y;
          let ang = (Math.atan2(-dy, turn === 0 ? dx : -dx) * 180) / Math.PI;
          aimAngle = Math.max(5, Math.min(85, ang));
          aimPower = Math.min(100, Math.hypot(dx, dy) / 2);
          e.preventDefault();
        },
        { passive: false },
      );

      canvas.addEventListener(
        "touchend",
        (e) => {
          if (dragging && state === "aiming") {
            launch();
          }
          dragging = false;
          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener("keydown", (e) => {
        if (state !== "aiming" || turn !== 0) return;
        if (e.key === "ArrowUp") aimAngle = Math.min(85, aimAngle + 2);
        if (e.key === "ArrowDown") aimAngle = Math.max(5, aimAngle - 2);
        if (e.key === "ArrowRight") aimPower = Math.min(100, aimPower + 3);
        if (e.key === "ArrowLeft") aimPower = Math.max(10, aimPower - 3);
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          launch();
        }
      });

      // ===== UI =====
      function updateLevelUI() {
        document.getElementById("levelUI").textContent = "LEVEL " + level;
      }
      function updateHiUI() {
        var el = document.getElementById("hiUI");
        el.textContent = highScore > 0 ? "BEST: " + highScore : "";
      }
      function updateTurnUI() {
        var info = document.getElementById("turnInfo");
        info.textContent =
          turn === 0 ? "\u2190 AIM & THROW \u2192" : "COMPUTER IS AIMING\u2026";
        info.style.color =
          turn === 0 ? "rgba(0,204,80,.4)" : "rgba(59,139,255,.4)";
      }

      function showGameOver() {
        state = "gameover";
        var score = level;
        var isNewBest = score > highScore;
        if (isNewBest) {
          highScore = score;
          saveHighScore();
        }
        document.getElementById("goScore").textContent =
          "LEVEL REACHED: " + level;
        var hiEl = document.getElementById("goHigh");
        if (isNewBest && score > 0) {
          hiEl.textContent = "NEW BEST!";
          hiEl.className = "high-score new-best";
        } else {
          hiEl.textContent = highScore > 0 ? "BEST: " + highScore : "";
          hiEl.className = "high-score";
        }
        document.getElementById("gameOver").classList.add("show");
      }

      // ===== AI (zero-in across shots, level-scaled convergence) =====
      function aiAim() {
        var target = dinoAimTarget(0);
        var origin = dinoMouth(1);
        var sx = origin.x,
          sy = origin.y;
        var best = null,
          bestDist = Infinity;
        for (var a = 18; a <= 82; a += 4) {
          for (var pw = 28; pw <= 100; pw += 4) {
            var ang = (-(180 - a) * Math.PI) / 180;
            var x = sx,
              y = sy,
              vx = Math.cos(ang) * pw * 0.1,
              vy = Math.sin(ang) * pw * 0.1;
            for (var s = 0; s < 500; s++) {
              vy += GRAVITY;
              x += vx;
              y += vy;
              if (y > H + 40 || x < -60 || x > W + 60) break;
              var dd = Math.hypot(x - target.x, y - target.y);
              if (dd < bestDist) {
                bestDist = dd;
                best = { a: a, pw: pw };
              }
              if (dd < 16) break;
            }
          }
        }
        if (!best) best = { a: 55, pw: 70 };

        // Zero-in is deterministic, so difficulty comes from convergence
        // instead of lucky easy rolls or impossible random snipes.
        var converge = Math.min(0.58, 0.28 + (level - 1) * 0.035);
        var baseAngleErr = 14;
        var basePowerErr = 18;
        var shotDecay = Math.pow(1 - converge, cpuShotCount);
        // Minimum residual error (never zero — always beatable)
        var minAngle = 1.8;
        var minPower = 2.4;
        var angleRange = Math.max(minAngle, baseAngleErr * shotDecay);
        var powerRange = Math.max(minPower, basePowerErr * shotDecay);
        var sign = cpuShotCount % 2 === 0 ? 1 : -1;
        var wobble = Math.sin(level * 1.37 + cpuShotCount * 2.11);
        var angleErr = sign * angleRange * (0.72 + Math.abs(wobble) * 0.16);
        var powerErr = -sign * powerRange * (0.62 + Math.abs(wobble) * 0.14);

        aimAngle = Math.max(5, Math.min(85, best.a + angleErr));
        aimPower = Math.max(12, Math.min(100, best.pw + powerErr));
        cpuShotCount++;
      }

      function maybeAI() {
        if (turn !== 1 || state !== "aiming") return;
        setTimeout(function () {
          if (turn !== 1 || state !== "aiming") return;
          aiAim();
          setTimeout(function () {
            if (turn === 1 && state === "aiming") launch();
          }, 550);
        }, 650);
      }

      // ===== START =====
      function updateTitleHi() {
        var el = document.getElementById("titleHi");
        el.textContent = highScore > 0 ? "BEST: LEVEL " + highScore : "";
      }

      document.getElementById("startBtn").addEventListener("click", startGame);
      document
        .getElementById("restartBtn")
        .addEventListener("click", function () {
          document.getElementById("gameOver").classList.remove("show");
          startGame();
        });

      function startGame() {
        document.getElementById("titleScreen").classList.add("hide");
        level = 1;
        updateLevelUI();
        updateHiUI();
        turn = 0;
        aimAngle = 45;
        aimPower = 60;
        cpuShotCount = 0;
        cpuLastMiss = { dx: 0, dy: 0 };
        projectile = null;
        explosions = [];
        particles = [];
        fireTrail = [];
        generateCity();
        state = "aiming";
        updateTurnUI();
      }

      updateTitleHi();
      updateHiUI();
      generateCity();
      gameLoop();
    </script>
  </body>
</html>
